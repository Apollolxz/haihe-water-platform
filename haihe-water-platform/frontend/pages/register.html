<!DOCTYPE html>

        tailwind.config = {
            theme: {

                    colors: {
                        primary: '#0ea5e9',
                        'primary-dark': '#0284c7',

                        'secondary-dark': '#16a34a',

                        'wave': 'wave 8s linear infinite',

                    keyframes: {

</head>

        <!-- 右侧注册表单 -->

                <form id="registerForm" class="space-y-6">
                    <div>

                    <div>

                            </span>
                            <input type="password" id="confirmPassword" name="confirmPassword" class="w-full pl-10 pr-4 py-3 border border-dark-lighter rounded-lg input-focus bg-dark-light text-white" placeholder="请再次输入密码" required>
                        </div>
                    </div>
                    <div>

                            </span>
                            <input type="email" id="email" name="email" class="w-full pl-10 pr-4 py-3 border border-dark-lighter rounded-lg input-focus bg-dark-light text-white" placeholder="请输入邮箱" required>

                            <label class="flex items-center space-x-2 cursor-pointer">

    <!-- 粒子动画脚本 -->
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        particlesJS('particles-js', {
            particles: {
                number: {
                    value: 80,
                    density: {
                        enable: true,
                        value_area: 800
                    }
                },
                color: {
                    value: '#0ea5e9'
                },
                shape: {
                    type: 'circle',
                    stroke: {
                        width: 0,
                        color: '#000000'
                    }
                },
                opacity: {
                    value: 0.5,
                    random: true,
                    anim: {
                        enable: true,
                        speed: 1,
                        opacity_min: 0.1,
                        sync: false
                    }
                },
                size: {
                    value: 3,
                    random: true,
                    anim: {
                        enable: true,
                        speed: 2,
                        size_min: 0.1,
                        sync: false
                    }
                },
                line_linked: {
                    enable: true,
                    distance: 150,
                    color: '#06b6d4',
                    opacity: 0.4,
                    width: 1
                },
                move: {
                    enable: true,
                    speed: 1,
                    direction: 'none',
                    random: false,
                    straight: false,
                    out_mode: 'out',
                    bounce: false,
                    attract: {
                        enable: false,
                        rotateX: 600,
                        rotateY: 1200
                    }
                }
            },
            interactivity: {
                detect_on: 'canvas',
                events: {
                    onhover: {
                        enable: true,
                        mode: 'repulse'
                    },
                    onclick: {
                        enable: true,
                        mode: 'push'
                    },
                    resize: true
                },
                modes: {
                    repulse: {
                        distance: 100,
                        duration: 0.4
                    },
                    push: {
                        particles_nb: 4
                    }
                }
            },
            retina_detect: true
        });
    </script>

    <script>
        // 切换密码可见性
        document.getElementById('togglePassword').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            const icon = this.querySelector('i');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            } else {
                passwordInput.type = 'password';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            }
        });

        // 发送验证码
        document.getElementById('sendCodeBtn').addEventListener('click', function() {
            const email = document.getElementById('email').value;
            const sendCodeBtn = this;
            
            if (!email) {
                alert('请先输入邮箱');
                return;
            }
            
            // 模拟发送验证码
            sendCodeBtn.disabled = true;
            sendCodeBtn.textContent = '60s后重发';
            
            let countdown = 60;
            const timer = setInterval(() => {
                countdown--;
                sendCodeBtn.textContent = `${countdown}s后重发`;
                
                if (countdown <= 0) {
                    clearInterval(timer);
                    sendCodeBtn.disabled = false;
                    sendCodeBtn.textContent = '发送验证码';
                }
            }, 1000);
            
            alert(`邮箱验证码已发送至 ${email}`);
        });

        // 注册表单提交
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const email = document.getElementById('email').value;
            const verificationCode = document.getElementById('verificationCode').value;
            const tag = document.querySelector('input[name="tag"]:checked')?.value;
            const agreeTerms = document.getElementById('agreeTerms').checked;
            
            // 表单验证
            if (!username || !password || !confirmPassword || !email || !verificationCode || !tag || !agreeTerms) {
                alert('请填写所有必填项');
                return;
            }
            
            if (password !== confirmPassword) {
                alert('两次输入的密码不一致');
                return;
            }
            
            // 验证码验证（这里使用模拟验证码，实际应用中应该由后端验证）
            if (verificationCode !== '123456') {
                alert('验证码错误');
                return;
            }
            
            try {
                // 调用后端注册API
                const response = await fetch('http://127.0.0.1:5001/api/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password, email, tag })
                });
                
                if (!response.ok) {
                    throw new Error('注册失败');
                }
                
                const data = await response.json();
                
                alert('账号创建成功，请登录海河六域');
                window.location.href = 'login.html';
            } catch (error) {
                alert('注册失败，请检查输入信息');
                console.error('注册错误:', error);
            }
        });
    </script>
</body>
