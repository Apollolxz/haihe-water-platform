<head>

<link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">

<script>
tailwind.config={theme:{extend:{colors:{primary:'#0ea5e9',cyan2:'#38bdf8',mint:'#22c55e',dark:'#1a2435',panel:'#111b2b'},fontFamily:{sans:['Noto Sans SC','Microsoft YaHei','sans-serif'],display:['Rajdhani','Noto Sans SC','sans-serif']}}};
</script>
<style>
:root{--bg-deep:#1a2435;--bg-panel:rgba(24,34,52,0.55);--border:rgba(148,163,184,0.1);--border-glow:rgba(14,165,233,0.28);--text-primary:#f8fafc;--text-secondary:#cbd5e1;--text-muted:#94a3b8;--cyan:#0ea5e9;--green:#22c55e;}
html,body{min-height:100%;margin:0;background:radial-gradient(circle at 15% 15%,rgba(14,165,233,0.1),transparent 30%),radial-gradient(circle at 82% 14%,rgba(111,140,255,0.06),transparent 28%),radial-gradient(circle at 50% 100%,rgba(83,211,255,0.04),transparent 28%),linear-gradient(135deg,#0a111e 0%,#111b2b 46%,#121f2f 100%);color:var(--text-secondary);font-family:"Noto Sans SC","Microsoft YaHei",sans-serif;}
body::before{content:"";position:fixed;inset:0;pointer-events:none;background-image:linear-gradient(rgba(14,165,233,0.035) 1px,transparent 1px),linear-gradient(90deg,rgba(14,165,233,0.035) 1px,transparent 1px);background-size:50px 50px;mask-image:linear-gradient(180deg,rgba(0,0,0,0.55),transparent 92%);}
h1,h2,h3,h4,h5,h6{color:var(--text-primary);font-weight:600;}
strong,.font-semibold{font-weight:600;}
.bg-gradient-water{background:linear-gradient(135deg,#0ea5e9 0%,#06b6d4 50%,#22c55e 100%);}
.nav-link{position:relative;display:inline-flex;align-items:center;padding:0.5rem 1rem;color:#d1d5db;text-decoration:none;transition:all 0.3s;border-radius:0.375rem;}
.nav-link:hover{color:#fff;background:rgba(255,255,255,0.05);}
.nav-link.active{color:#fff;font-weight:500;}
.nav-link::after{content:'';position:absolute;bottom:0;left:50%;width:0;height:2px;background:linear-gradient(90deg,#0ea5e9,#22c55e);transition:all 0.3s;transform:translateX(-50%);}
.nav-link:hover::after,.nav-link.active::after{width:80%;}
.nav-core{position:relative;display:inline-flex;align-items:center;padding:0.5rem 1.25rem;border-radius:9999px;color:#fff;font-weight:600;font-size:0.875rem;text-decoration:none;background:linear-gradient(135deg,#0ea5e9 0%,#06b6d4 50%,#22c55e 100%);box-shadow:0 0 12px rgba(14,165,233,0.4);transition:all 0.3s;}
.nav-core:hover{box-shadow:0 0 20px rgba(14,165,233,0.7);transform:translateY(-1px);}
.page-shell{width:min(1740px,calc(100% - 20px));margin:0 auto;padding:84px 10px 20px;display:flex;flex-direction:column;min-height:100vh;gap:16px;}
.panel{border:1px solid var(--border);border-radius:16px;background:var(--bg-panel);box-shadow:0 4px 24px rgba(0,0,0,0.35),inset 0 1px 0 rgba(255,255,255,0.03);overflow:hidden;backdrop-filter:blur(12px);transition:all 0.3s ease;}
.panel:hover{border-color:rgba(14,165,233,0.25);box-shadow:0 8px 32px rgba(0,0,0,0.4),inset 0 1px 0 rgba(255,255,255,0.05),0 0 20px rgba(14,165,233,0.06);}
.muted{color:var(--text-muted);}
.field-box,.chip,.status-card,.item-card{border:1px solid rgba(255,255,255,0.05);background:rgba(255,255,255,0.025);border-radius:8px;transition:all 0.25s ease;}
.field-box:hover,.chip:hover,.status-card:hover,.item-card:hover{background:rgba(14,165,233,0.06);border-color:rgba(14,165,233,0.25);}
.category-button{border:1px solid rgba(255,255,255,0.05);background:rgba(255,255,255,0.025);border-radius:8px;transition:all 0.25s ease;cursor:pointer;}
.category-button:hover{background:rgba(255,255,255,0.05);border-color:rgba(14,165,233,0.18);}
.category-button.active{background:rgba(14,165,233,0.15);border-color:rgba(14,165,233,0.35);box-shadow:0 0 16px rgba(14,165,233,0.15);}
.graph-stage{flex:1;min-height:360px;border:1px solid rgba(255,255,255,0.06);border-radius:16px;background:#0c1220;overflow:hidden;box-shadow:inset 0 0 40px rgba(14,165,233,0.04);}
#knowledgeGraph{width:100%;height:100%;min-height:0;}
.btn-lite{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:4px 12px;border-radius:6px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.03);color:#ccc;font-weight:500;font-size:13px;transition:all 0.25s ease;cursor:pointer;}
.btn-lite:hover{background:rgba(14,165,233,0.12);border-color:rgba(14,165,233,0.3);color:#fff;box-shadow:0 0 12px rgba(14,165,233,0.15);}
.btn-lite.primary{background:linear-gradient(135deg,rgba(73,146,255,0.25),rgba(88,217,249,0.2));border-color:rgba(14,165,233,0.35);color:#fff;}
.btn-lite.primary:hover{background:linear-gradient(135deg,rgba(14,165,233,0.4),rgba(88,217,249,0.3));box-shadow:0 4px 16px rgba(73,146,255,0.25);}
.btn-lite.active{border-color:rgba(14,165,233,0.45);background:rgba(14,165,233,0.15);color:#fff;box-shadow:0 0 16px rgba(14,165,233,0.25);}
.loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;background:rgba(6,10,18,0.85);backdrop-filter:blur(10px);z-index:80;}
.loading.hidden{display:none !important;}
.spinner{width:48px;height:48px;border-radius:50%;border:3px solid rgba(14,165,233,0.12);border-top-color:#0ea5e9;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes popoverIn{0%{opacity:0;transform:translateY(8px) scale(0.96);}100%{opacity:1;transform:translateY(0) scale(1);}}
.main-grid{display:grid;grid-template-columns:260px 1fr 280px;gap:16px;flex:1;min-height:0;}
.left-col,.right-col{display:flex;flex-direction:column;gap:16px;min-height:0;}
.center-col{display:flex;flex-direction:column;min-height:0;}
@media (max-width:1280px){.main-grid{grid-template-columns:1fr;}.left-col,.right-col{flex-direction:row;flex-wrap:wrap;}.left-col>section,.right-col>section{flex:1;min-width:260px;}.graph-stage{min-height:420px;max-height:none;}}
@media (max-width:860px){.graph-stage{min-height:340px;}}
.graph-hint{display:flex;flex-wrap:wrap;justify-content:center;gap:20px;margin-top:10px;padding:8px 0;color:#94a3b8;font-size:12px;}
.graph-hint span{display:inline-flex;align-items:center;gap:6px;}
.graph-hint i{color:#38bdf8;font-size:13px;}
.vis-network{outline:none;}
</style>
</head>

<div class="relative">
<button class="flex items-center space-x-2 focus:outline-none" id="userMenuBtn">
<div class="w-8 h-8 rounded-full bg-gradient-water flex items-center justify-center"><i class="fa fa-user text-white"></i></div>
<span class="text-sm font-medium text-gray-400 hidden md:inline" id="userName">访客</span>
<i class="fa fa-chevron-down text-xs text-gray-500"></i>
</button>

<a href="sandbox.html" class="block px-4 py-3 text-white bg-gradient-water rounded-lg transition-colors"><i class="fa fa-globe mr-2"></i>流域时空推演沙盘</a>

<div class="page-shell">
<section class="main-grid">
<aside class="left-col" id="leftRail">
<section class="panel p-5" style="flex:0 0 auto">
<div class="mb-4"><h3 class="text-lg font-bold">图例说明</h3></div>
<div id="legendList" class="grid gap-2"></div>
</section>
<section class="panel p-5" style="flex:0 0 auto">
<div class="mb-4"><h3 class="text-lg font-bold">检索与筛选</h3></div>
<div class="grid gap-4">
<div class="field-box flex items-center gap-3 px-4 py-3"><i class="fa fa-search text-gray-500"></i><input id="searchInput" class="w-full bg-transparent outline-none text-sm" style="color:var(--text-secondary)" type="text" placeholder="输入站点、河流、污染物或省份名称"></div>
<div class="grid sm:grid-cols-2 gap-3">
<button class="btn-lite primary" id="searchBtn"><i class="fa fa-crosshairs"></i>定位结果</button>
<button class="btn-lite" id="resetBtn"><i class="fa fa-undo"></i>重置视图</button>
</div>
<div class="status-card p-4 text-sm leading-7" id="searchStatus">输入名称定位节点。</div>
</div>
</section>
<section class="panel p-5" style="flex:1;min-height:0;overflow:auto">
<div class="flex items-start justify-between gap-3 mb-3"><h3 class="text-lg font-bold">实体分类</h3><div class="chip px-3 py-2 text-xs" id="categoryPanelMeta">--</div></div>
<div id="categoryList" class="grid gap-2"></div>
</section>
<section class="panel p-5" style="flex:0 0 auto">
<div class="mb-3"><h3 class="text-lg font-bold">关系分布</h3></div>
<div id="relationList" class="grid gap-2"></div>
</section>
</aside>

<div class="center-col">
<section class="panel p-5" style="flex:1;min-height:0;display:flex;flex-direction:column">
<div class="flex flex-wrap items-start justify-between gap-3 mb-4">
<div class="flex items-center gap-3"><h3 class="text-lg font-bold">知识图谱可视化</h3></div>
</div>
<div class="grid lg:grid-cols-2 gap-3 mb-4">
<div class="flex flex-wrap gap-3">
<button class="btn-lite active" id="forceLayoutBtn"><i class="fa fa-random"></i>力导布局</button>
<button class="btn-lite" id="hierarchyLayoutBtn"><i class="fa fa-sitemap"></i>层级布局</button>
<button class="btn-lite" id="circleLayoutBtn"><i class="fa fa-circle-o"></i>环形布局</button>
<button class="btn-lite" id="physicsBtn"><i class="fa fa-pause"></i>关闭物理模拟</button>
</div>
<div class="flex flex-wrap gap-3 lg:justify-end">
<a class="btn-lite" id="returnSandboxBtn" href="sandbox.html"><i class="fa fa-reply"></i><span>返回沙盘</span></a>
<button class="btn-lite" id="fitBtn"><i class="fa fa-expand"></i>适配视图</button>
<button class="btn-lite" id="fullscreenBtn"><i class="fa fa-arrows-alt"></i>聚焦图谱</button>
</div>
</div>
<div class="graph-stage flex-1"><div id="knowledgeGraph"></div></div>
<div class="graph-hint" id="graphHint"><span><i class="fa fa-hand-paper-o"></i>拖拽节点</span><span><i class="fa fa-search-plus"></i>滚轮缩放</span><span><i class="fa fa-mouse-pointer"></i>点击查看详情</span><span><i class="fa fa-arrows"></i>右键拖拽画布</span></div>
<div class="mt-4"><div class="status-card p-4 text-sm leading-7" id="graphStatus">加载中...</div></div>
</section>
<section class="panel p-5" style="flex:0 0 auto">
<div class="flex flex-wrap items-center justify-between gap-3 mb-4">
<div class="flex items-center gap-3">
<h3 class="text-lg font-bold">超标事件查询</h3>
<div class="chip px-3 py-2 text-xs" id="exceedPollutantTag" style="display:none"></div>
</div>
<div class="chip px-3 py-2 text-xs" id="exceedSummary">尚未执行查询。</div>
</div>
<div class="flex flex-wrap items-end gap-4">
<div class="flex-1 min-w-[140px]"><label class="text-[11px] uppercase tracking-[0.12em] muted block mb-1">省份</label><div class="field-box px-3 py-2"><select id="exceedProvince" class="w-full bg-transparent outline-none text-sm" style="color:var(--text-secondary)"></select></div></div>
<div class="flex-1 min-w-[140px]"><label class="text-[11px] uppercase tracking-[0.12em] muted block mb-1">开始日期</label><div class="field-box px-3 py-2"><input id="exceedStart" type="date" value="2022-03-24" class="w-full bg-transparent outline-none text-sm" style="color:var(--text-secondary)"></div></div>
<div class="flex-1 min-w-[140px]"><label class="text-[11px] uppercase tracking-[0.12em] muted block mb-1">结束日期</label><div class="field-box px-3 py-2"><input id="exceedEnd" type="date" value="2022-06-18" class="w-full bg-transparent outline-none text-sm" style="color:var(--text-secondary)"></div></div>
<button class="btn-lite primary" id="runExceedBtn"><i class="fa fa-search"></i>查询超标事件</button>
</div>
<div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-6 gap-3 mt-4" id="exceedList"></div>
</section>
</div>

<aside class="right-col" id="rightRail">
<section class="panel p-5" style="flex:0 0 auto">
<div class="mb-4"><h3 class="text-lg font-bold">节点详情</h3></div>
<div id="nodeDetailBody" class="status-card p-4 text-sm leading-7">点击节点查看详情。</div>
</section>
<section class="panel p-5" style="flex:0 0 auto">
<div class="mb-4"><h3 class="text-lg font-bold">污染溯源</h3></div>
<div class="grid gap-4">
<div class="grid gap-2"><label class="text-[11px] uppercase tracking-[0.12em] muted">目标站点</label><div class="field-box px-3 py-2"><select id="traceStation" class="w-full bg-transparent outline-none text-sm" style="color:var(--text-secondary)"></select></div></div>
<div class="grid gap-2"><label class="text-[11px] uppercase tracking-[0.12em] muted">指标</label><div class="field-box px-3 py-2"><select id="tracePollutant" class="w-full bg-transparent outline-none text-sm" style="color:var(--text-secondary)"></select></div></div>
<div class="grid gap-2"><label class="text-[11px] uppercase tracking-[0.12em] muted">日期</label><div class="field-box px-3 py-2"><input id="traceDate" type="date" value="2022-05-01" class="w-full bg-transparent outline-none text-sm" style="color:var(--text-secondary)"></div></div>
<button class="btn-lite primary" id="runTraceBtn"><i class="fa fa-play"></i>执行溯源</button>
<div class="status-card p-4 text-sm leading-7" id="traceSummary">尚未执行溯源查询。</div>
<div class="grid gap-2" id="traceList"></div>
</div>
</section>
<section class="panel p-5" style="flex:0 0 auto">
<div class="mb-4"><h3 class="text-lg font-bold">上游站点</h3></div>
<div class="status-card p-4 text-sm leading-7" id="upstreamSummary">尚未选择监测站点。</div>
<div class="grid gap-2 mt-3" id="upstreamList"></div>
</section>
</aside>
</section>
</div>

<div class="loading" id="loadingMask"><div class="spinner"></div><div>正在同步知识图谱...</div></div>
