<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>海河六域 - 指标分布与异常预警专项屏</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; min-height: 100%; overflow-x: hidden; overflow-y: auto;
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0a0f1c 0%, #0d1321 50%, #0a0f1c 100%);
            color: #fff;
        }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: rgba(14, 165, 233, 0.1); border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: linear-gradient(135deg, rgba(14, 165, 233, 0.5), rgba(34, 197, 94, 0.5)); border-radius: 4px; }
        .bg-grid { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(rgba(14, 165, 233, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(14, 165, 233, 0.03) 1px, transparent 1px); background-size: 50px 50px; pointer-events: none; z-index: 0; }
        .glow-orb { position: fixed; border-radius: 50%; filter: blur(100px); pointer-events: none; z-index: 0; }
        .glow-orb-1 { top: -10%; left: -10%; width: 400px; height: 400px; background: radial-gradient(circle, rgba(14, 165, 233, 0.15) 0%, transparent 70%); }
        .glow-orb-2 { bottom: -10%; right: -10%; width: 500px; height: 500px; background: radial-gradient(circle, rgba(34, 197, 94, 0.1) 0%, transparent 70%); }
        .top-nav { position: fixed; top: 0; left: 0; right: 0; height: 64px; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(14, 165, 233, 0.2); z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 0 30px; }
        .nav-title { font-size: 22px; font-weight: bold; background: linear-gradient(90deg, #0ea5e9, #22c55e); -webkit-background-clip: text; -webkit-text-fill-color: transparent; display: flex; align-items: center; gap: 12px; }
        .nav-back { padding: 8px 20px; background: rgba(14, 165, 233, 0.15); border: 1px solid rgba(14, 165, 233, 0.4); border-radius: 6px; color: #0ea5e9; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; gap: 8px; font-size: 14px; }
        .nav-back:hover { background: rgba(14, 165, 233, 0.3); }
        .main-container { position: relative; top: 64px; left: 0; right: 0; min-height: calc(100vh - 64px); padding: 20px; z-index: 1; display: flex; flex-direction: column; gap: 20px; padding-bottom: 40px; }
        .conclusion-bar { display: flex; gap: 20px; padding: 15px 20px; background: linear-gradient(90deg, rgba(14, 165, 233, 0.1) 0%, rgba(34, 197, 94, 0.05) 50%, rgba(14, 165, 233, 0.1) 100%); border: 1px solid rgba(14, 165, 233, 0.3); border-radius: 12px; position: relative; overflow: hidden; }
        .conclusion-bar::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent 0%, #0ea5e9 20%, #22c55e 50%, #0ea5e9 80%, transparent 100%); }
        .conclusion-tag { flex: 1; padding: 15px 20px; background: rgba(15, 23, 42, 0.6); border-radius: 10px; border: 1px solid; display: flex; align-items: center; gap: 15px; }
        .conclusion-tag.tag-1 { border-color: rgba(0, 228, 0, 0.4); background: linear-gradient(135deg, rgba(0, 228, 0, 0.1) 0%, rgba(15, 23, 42, 0.8) 100%); }
        .conclusion-tag.tag-2 { border-color: rgba(14, 165, 233, 0.4); background: linear-gradient(135deg, rgba(14, 165, 233, 0.1) 0%, rgba(15, 23, 42, 0.8) 100%); }
        .tag-icon { width: 50px; height: 50px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .tag-1 .tag-icon { background: rgba(0, 228, 0, 0.2); color: #00e400; }
        .tag-2 .tag-icon { background: rgba(14, 165, 233, 0.2); color: #0ea5e9; }
        .tag-content { flex: 1; }
        .tag-title { font-size: 13px; color: #94a3b8; margin-bottom: 4px; }
        .tag-value { font-size: 14px; font-weight: 600; color: #e2e8f0; line-height: 1.5; }
        .tag-highlight { color: #22c55e; font-weight: bold; }
        .content-area { display: grid; grid-template-columns: 1fr 400px; gap: 20px; min-height: 700px; }
        .chart-card { background: linear-gradient(145deg, rgba(15, 23, 42, 0.8) 0%, rgba(30, 41, 59, 0.6) 100%); border: 1px solid rgba(14, 165, 233, 0.2); border-radius: 12px; padding: 20px; position: relative; overflow: hidden; display: flex; flex-direction: column; }
        .chart-card::before, .chart-card::after { content: ''; position: absolute; width: 20px; height: 20px; border: 2px solid #0ea5e9; }
        .chart-card::before { top: 0; left: 0; border-right: none; border-bottom: none; border-top-left-radius: 8px; }
        .chart-card::after { bottom: 0; right: 0; border-left: none; border-top: none; border-bottom-right-radius: 8px; }
        .corner-decoration { position: absolute; width: 20px; height: 20px; border: 2px solid #0ea5e9; }
        .corner-tl { top: 0; left: 0; border-right: none; border-bottom: none; border-top-left-radius: 8px; }
        .corner-tr { top: 0; right: 0; border-left: none; border-bottom: none; border-top-right-radius: 8px; }
        .corner-bl { bottom: 0; left: 0; border-right: none; border-top: none; border-bottom-left-radius: 8px; }
        .corner-br { bottom: 0; right: 0; border-left: none; border-top: none; border-bottom-right-radius: 8px; }
        .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid rgba(14, 165, 233, 0.2); flex-shrink: 0; }
        .card-title { font-size: 16px; font-weight: 600; color: #e2e8f0; display: flex; align-items: center; gap: 10px; }
        .card-title i { color: #0ea5e9; font-size: 18px; }
        .card-subtitle { font-size: 12px; color: #64748b; }
        .chart-container { flex: 1; min-height: 0; position: relative; }
        .boxplot-grid { display: grid; grid-template-columns: 1fr; gap: 15px; height: 100%; }
        .boxplot-item { background: rgba(15, 23, 42, 0.5); border-radius: 10px; border: 1px solid rgba(14, 165, 233, 0.15); padding: 15px; display: flex; gap: 15px; align-items: center; }
        .boxplot-info { width: 120px; flex-shrink: 0; }
        .boxplot-name { font-size: 14px; font-weight: 600; color: #e2e8f0; margin-bottom: 8px; }
        .boxplot-stats { font-size: 11px; color: #64748b; line-height: 1.6; }
        .boxplot-chart { flex: 1; height: 100px; min-height: 100px; }
        .right-panel { display: flex; flex-direction: column; gap: 15px; height: fit-content; }
        .stats-table { width: 100%; border-collapse: collapse; font-size: 11px; }
        .stats-table th, .stats-table td { padding: 8px 6px; text-align: center; border-bottom: 1px solid rgba(14, 165, 233, 0.1); }
        .stats-table th { background: rgba(14, 165, 233, 0.15); color: #0ea5e9; font-weight: 600; font-size: 10px; }
        .stats-table td { color: #e2e8f0; }
        .stats-indicator { font-weight: 600; font-size: 11px; color: #0ea5e9; }
        .threshold-item { padding: 12px; background: rgba(15, 23, 42, 0.5); border-radius: 8px; margin-bottom: 10px; border-left: 3px solid #f59e0b; }
        .threshold-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
        .threshold-name { font-size: 13px; font-weight: 600; color: #e2e8f0; }
        .threshold-range { font-size: 11px; padding: 3px 8px; border-radius: 10px; background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
        .threshold-inputs { display: flex; gap: 10px; align-items: center; }
        .threshold-input-group { flex: 1; }
        .threshold-label { font-size: 10px; color: #64748b; margin-bottom: 4px; }
        .threshold-input { width: 100%; padding: 6px 10px; background: rgba(14, 165, 233, 0.1); border: 1px solid rgba(14, 165, 233, 0.3); border-radius: 6px; color: #e2e8f0; font-size: 12px; }
        .save-btn { padding: 6px 14px; background: linear-gradient(135deg, rgba(34, 197, 94, 0.2), rgba(34, 197, 94, 0.3)); border: 1px solid rgba(34, 197, 94, 0.4); border-radius: 6px; color: #22c55e; font-size: 11px; cursor: pointer; }
        .stability-overview { padding: 20px; background: linear-gradient(135deg, rgba(14, 165, 233, 0.1), rgba(34, 197, 94, 0.1)); border-radius: 10px; border: 1px solid rgba(14, 165, 233, 0.3); margin-bottom: 15px; text-align: center; }
        .stability-score-large { font-size: 48px; font-weight: bold; background: linear-gradient(90deg, #0ea5e9, #22c55e); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .stability-label { font-size: 14px; color: #94a3b8; margin-top: 5px; }
        .stability-list { display: flex; flex-direction: column; gap: 8px; }
        .stability-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; background: rgba(15, 23, 42, 0.5); border-radius: 8px; }
        .stability-indicator { font-size: 12px; color: #e2e8f0; }
        .stability-bar { flex: 1; height: 8px; background: rgba(148, 163, 184, 0.2); border-radius: 4px; margin: 0 10px; overflow: hidden; }
        .stability-fill { height: 100%; border-radius: 4px; }
        .stability-value { font-size: 12px; font-weight: 600; width: 40px; text-align: right; }
        .outlier-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.7); z-index: 2000; display: none; align-items: center; justify-content: center; }
        .outlier-modal.active { display: flex; }
        .outlier-content { background: rgba(15, 23, 42, 0.98); border: 1px solid rgba(239, 68, 68, 0.4); border-radius: 12px; padding: 25px; max-width: 500px; width: 90%; max-height: 80vh; overflow-y: auto; }
        .outlier-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid rgba(239, 68, 68, 0.2); }
        .outlier-title { font-size: 18px; font-weight: bold; color: #ef4444; }
        .outlier-close { width: 32px; height: 32px; border-radius: 50%; background: rgba(239, 68, 68, 0.2); border: 1px solid rgba(239, 68, 68, 0.4); color: #ef4444; cursor: pointer; }
        .outlier-item { padding: 12px; background: rgba(239, 68, 68, 0.1); border-radius: 8px; border-left: 3px solid #ef4444; margin-bottom: 10px; }
        .outlier-label { font-size: 11px; color: #64748b; margin-bottom: 4px; }
        .outlier-value { font-size: 14px; color: #e2e8f0; font-weight: 600; }
        @media (max-width: 1400px) { .content-area { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="glow-orb glow-orb-1"></div>
    <div class="glow-orb glow-orb-2"></div>
    
    <nav class="top-nav">
        <div class="nav-title">
            <i class="fa fa-bar-chart"></i>
            指标分布与异常预警专项屏
        </div>
        <div style="display: flex; align-items: center; gap: 20px;">
            <div style="color: #94a3b8; font-size: 13px;">
                <i class="fa fa-clock-o mr-2"></i>
                <span id="currentTime">--</span>
            </div>
            <button class="nav-back" onclick="goBack()">
                <i class="fa fa-arrow-left"></i>
                返回大屏
            </button>
        </div>
    </nav>
    
    <div class="main-container">
        <div class="conclusion-bar">
            <div class="conclusion-tag tag-1">
                <div class="tag-icon"><i class="fa fa-check-circle"></i></div>
                <div class="tag-content">
                    <div class="tag-title">中位数达标情况</div>
                    <div class="tag-value">所有指标中位数均<span class="tag-highlight">优于国标Ⅱ类标准</span>，多数接近<span class="tag-highlight">Ⅰ类</span></div>
                </div>
            </div>
            <div class="conclusion-tag tag-2">
                <div class="tag-icon"><i class="fa fa-line-chart"></i></div>
                <div class="tag-content">
                    <div class="tag-title">水质稳定性</div>
                    <div class="tag-value">指标箱体<span class="tag-highlight">极窄</span>，波动<span class="tag-highlight">极小</span>，异常值仅为偶发扰动</div>
                </div>
            </div>
        </div>
        
        <div class="content-area">
            <div class="chart-card">
                <div class="corner-decoration corner-tl"></div>
                <div class="corner-decoration corner-tr"></div>
                <div class="corner-decoration corner-bl"></div>
                <div class="corner-decoration corner-br"></div>
                
                <div class="card-header">
                    <div class="card-title"><i class="fa fa-bar-chart"></i>核心指标箱线图分布</div>
                    <div class="card-subtitle">点击异常值查看详情</div>
                </div>
                <div class="chart-container">
                    <div class="boxplot-grid" id="boxplotGrid"></div>
                </div>
            </div>
            
            <div class="right-panel">
                <div class="chart-card">
                    <div class="corner-decoration corner-tl"></div>
                    <div class="corner-decoration corner-tr"></div>
                    <div class="corner-decoration corner-bl"></div>
                    <div class="corner-decoration corner-br"></div>
                    <div class="card-header">
                        <div class="card-title"><i class="fa fa-table"></i>指标分布统计详情</div>
                    </div>
                    <div class="chart-container" style="overflow: auto;">
                        <table class="stats-table">
                            <thead>
                                <tr><th>指标</th><th>最小值</th><th>Q1</th><th>中位数</th><th>Q3</th><th>最大值</th><th>IQR</th></tr>
                            </thead>
                            <tbody id="statsTableBody"></tbody>
                        </table>
                    </div>
                </div>
                
                <div class="chart-card">
                    <div class="corner-decoration corner-tl"></div>
                    <div class="corner-decoration corner-tr"></div>
                    <div class="corner-decoration corner-bl"></div>
                    <div class="corner-decoration corner-br"></div>
                    <div class="card-header">
                        <div class="card-title"><i class="fa fa-warning"></i>异常预警阈值设置</div>
                    </div>
                    <div class="chart-container" id="thresholdContainer" style="overflow: auto;"></div>
                </div>
                
                <div class="chart-card">
                    <div class="corner-decoration corner-tl"></div>
                    <div class="corner-decoration corner-tr"></div>
                    <div class="corner-decoration corner-bl"></div>
                    <div class="corner-decoration corner-br"></div>
                    <div class="card-header">
                        <div class="card-title"><i class="fa fa-star"></i>水质稳定性评分</div>
                    </div>
                    <div class="chart-container">
                        <div class="stability-overview">
                            <div class="stability-score-large" id="overallStability">--</div>
                            <div class="stability-label">全流域综合稳定性评分</div>
                        </div>
                        <div class="stability-list" id="stabilityList"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="outlier-modal" id="outlierModal">
        <div class="outlier-content">
            <div class="outlier-header">
                <div class="outlier-title" id="outlierModalTitle"><i class="fa fa-exclamation-triangle"></i> 异常值详情</div>
                <button class="outlier-close" onclick="closeOutlierModal()"><i class="fa fa-times"></i></button>
            </div>
            <div id="outlierDetail"></div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.protocol === 'file:' ? 'http://127.0.0.1:5001/api' : 
                        window.location.port ? `${window.location.protocol}//${window.location.hostname}:5001/api` : 
                        `${window.location.protocol}//${window.location.hostname}/api`;
        
        let charts = {};
        let boxplotData = null;
        
        const indicatorConfig = {
            '溶解氧': { unit: 'mg/L', level1: 7.5, level2: 6.0, level3: 5.0, higherBetter: true },
            '氨氮': { unit: 'mg/L', level1: 0.15, level2: 0.5, level3: 1.0, higherBetter: false },
            '总磷': { unit: 'mg/L', level1: 0.02, level2: 0.1, level3: 0.2, higherBetter: false },
            '高锰酸盐指数': { unit: 'mg/L', level1: 2.0, level2: 4.0, level3: 6.0, higherBetter: false },
            'PH': { unit: '', min: 6.0, max: 9.0, higherBetter: null }
        };
        
        document.addEventListener('DOMContentLoaded', function() {
            loadData();
            updateTime();
            setInterval(updateTime, 1000);
        });
        
        function updateTime() {
            const now = new Date();
            document.getElementById('currentTime').textContent = now.toLocaleString('zh-CN');
        }
        
        function goBack() {
            window.location.href = 'dashboard.html';
        }
        
        async function loadData() {
            try {
                console.log('Loading data from:', API_BASE);
                const response = await fetch(API_BASE + '/dashboard/boxplot-data');
                const result = await response.json();
                console.log('Response:', result);
                
                if (result.success && result.data && result.data.indicators && result.data.indicators.length > 0) {
                    boxplotData = result.data;
                    renderAll();
                    if (result.data.message) {
                        showToast(result.data.message);
                    }
                } else {
                    renderEmptyState((result.data && result.data.message) || result.error || '暂无真实箱线分析数据');
                }
            } catch (error) {
                console.error('Error:', error);
                renderEmptyState('数据加载失败，未加载到真实箱线分析数据');
            }
        }

        function clearChartInstances() {
            Object.values(charts).forEach(chart => {
                if (chart) {
                    chart.dispose();
                }
            });
            charts = {};
        }
        
        function renderAll() {
            renderBoxplots();
            updateStatsTable();
            updateThresholdPanel();
            updateStabilityPanel();
        }
        
        function renderBoxplots() {
            const container = document.getElementById('boxplotGrid');
            container.innerHTML = '';
            
            boxplotData.indicators.forEach((indicator, index) => {
                const item = document.createElement('div');
                item.className = 'boxplot-item';
                item.innerHTML = `
                    <div class="boxplot-info">
                        <div class="boxplot-name">${indicator.name}</div>
                        <div class="boxplot-stats">
                            中位数: ${indicator.statistics.median}${indicator.unit}<br>
                            IQR: ${indicator.statistics.iqr}<br>
                            异常值: ${indicator.outlier_count}个
                        </div>
                    </div>
                    <div class="boxplot-chart" id="boxplot_${index}"></div>
                `;
                container.appendChild(item);
                
                setTimeout(() => renderSingleBoxplot(index, indicator), 0);
            });
        }
        
        function renderSingleBoxplot(index, indicator) {
            const chartDom = document.getElementById(`boxplot_${index}`);
            if (!chartDom) return;
            
            const chart = echarts.init(chartDom);
            charts[`boxplot_${index}`] = chart;
            
            const config = indicatorConfig[indicator.name];
            const boxData = indicator.boxplot;
            const outliers = boxplotData.outliers && boxplotData.outliers[index] ? boxplotData.outliers[index].outliers : [];
            
            const outlierData = outliers.map(o => [0, o.value, o]);
            
            const markLines = [];
            if (config) {
                if (indicator.name === 'PH') {
                    markLines.push({ yAxis: config.min, lineStyle: { color: '#ef4444', type: 'dashed' }, label: { formatter: '国标下限', color: '#ef4444' } });
                    markLines.push({ yAxis: config.max, lineStyle: { color: '#ef4444', type: 'dashed' }, label: { formatter: '国标上限', color: '#ef4444' } });
                } else if (config.higherBetter) {
                    markLines.push({ yAxis: config.level1, lineStyle: { color: '#22c55e', type: 'dashed' }, label: { formatter: 'Ⅰ类', color: '#22c55e' } });
                    markLines.push({ yAxis: config.level2, lineStyle: { color: '#f59e0b', type: 'dashed' }, label: { formatter: 'Ⅱ类', color: '#f59e0b' } });
                    markLines.push({ yAxis: config.level3, lineStyle: { color: '#ef4444', type: 'dashed' }, label: { formatter: 'Ⅲ类', color: '#ef4444' } });
                } else {
                    markLines.push({ yAxis: config.level1, lineStyle: { color: '#22c55e', type: 'dashed' }, label: { formatter: 'Ⅰ类', color: '#22c55e' } });
                    markLines.push({ yAxis: config.level2, lineStyle: { color: '#f59e0b', type: 'dashed' }, label: { formatter: 'Ⅱ类', color: '#f59e0b' } });
                    markLines.push({ yAxis: config.level3, lineStyle: { color: '#ef4444', type: 'dashed' }, label: { formatter: 'Ⅲ类', color: '#ef4444' } });
                }
            }
            
            const option = {
                backgroundColor: 'transparent',
                tooltip: { trigger: 'item' },
                grid: { left: 10, right: 10, top: 20, bottom: 20 },
                xAxis: { type: 'category', data: [''], axisLabel: { show: false }, axisLine: { show: false }, splitLine: { show: false } },
                yAxis: { type: 'value', axisLabel: { color: '#64748b', fontSize: 9 }, splitLine: { lineStyle: { color: 'rgba(148,163,184,0.1)' } } },
                series: [
                    { type: 'boxplot', data: [[boxData[0], boxData[1], boxData[2], boxData[3], boxData[4]]], itemStyle: { color: 'rgba(14, 165, 233, 0.3)', borderColor: '#0ea5e9', borderWidth: 2 }, markLine: { silent: true, symbol: 'none', data: markLines } },
                    { type: 'scatter', data: outlierData, symbolSize: 10, itemStyle: { color: '#ef4444' } }
                ]
            };
            
            chart.setOption(option);
            chart.on('click', function(params) { if (params.seriesType === 'scatter' && params.data[2]) showOutlierDetail(indicator, params.data[2]); });
        }
        
        function updateStatsTable() {
            const tbody = document.getElementById('statsTableBody');
            tbody.innerHTML = boxplotData.indicators.map(ind => `
                <tr>
                    <td><div class="stats-indicator">${ind.name}</div></td>
                    <td>${ind.statistics.min}</td>
                    <td>${ind.statistics.q1}</td>
                    <td style="color: #22c55e; font-weight: 600;">${ind.statistics.median}</td>
                    <td>${ind.statistics.q3}</td>
                    <td>${ind.statistics.max}</td>
                    <td style="color: #0ea5e9;">${ind.statistics.iqr}</td>
                </tr>
            `).join('');
        }
        
        function updateThresholdPanel() {
            const container = document.getElementById('thresholdContainer');
            container.innerHTML = boxplotData.indicators.map((ind, idx) => `
                <div class="threshold-item">
                    <div class="threshold-header">
                        <div class="threshold-name">${ind.name} (${ind.unit})</div>
                        <div class="threshold-range">当前: ${ind.warning_threshold.lower} - ${ind.warning_threshold.upper}</div>
                    </div>
                    <div class="threshold-inputs">
                        <div class="threshold-input-group">
                            <div class="threshold-label">预警下限</div>
                            <input type="number" class="threshold-input" id="th_low_${idx}" value="${ind.warning_threshold.lower}" step="0.01">
                        </div>
                        <div class="threshold-input-group">
                            <div class="threshold-label">预警上限</div>
                            <input type="number" class="threshold-input" id="th_high_${idx}" value="${ind.warning_threshold.upper}" step="0.01">
                        </div>
                        <button class="save-btn" onclick="saveThreshold(${idx}, '${ind.name}')">保存</button>
                    </div>
                </div>
            `).join('');
        }
        
        function saveThreshold(index, name) {
            const lower = document.getElementById(`th_low_${index}`).value;
            const upper = document.getElementById(`th_high_${index}`).value;
            alert(`${name}预警阈值已保存: ${lower} - ${upper}`);
        }
        
        function updateStabilityPanel() {
            document.getElementById('overallStability').textContent = boxplotData.overall_stability || '--';
            
            const list = document.getElementById('stabilityList');
            list.innerHTML = boxplotData.indicators.map(ind => {
                const score = ind.stability_score;
                let color = '#22c55e';
                if (score < 60) color = '#ef4444';
                else if (score < 75) color = '#f59e0b';
                else if (score < 90) color = '#0ea5e9';
                
                return `
                    <div class="stability-item">
                        <div class="stability-indicator">${ind.name}</div>
                        <div class="stability-bar"><div class="stability-fill" style="width: ${score}%; background: ${color};"></div></div>
                        <div class="stability-value" style="color: ${color};">${score}</div>
                    </div>
                `;
            }).join('');
        }
        
        function showOutlierDetail(indicator, outlier) {
            const modal = document.getElementById('outlierModal');
            document.getElementById('outlierModalTitle').innerHTML = `<i class="fa fa-exclamation-triangle"></i> ${indicator.name} 异常值详情`;
            
            let analysis = '';
            const config = indicatorConfig[indicator.name];
            if (indicator.name === 'PH') {
                if (outlier.value < 6) analysis = 'PH值偏低，可能受酸性废水排放或酸雨影响。';
                else if (outlier.value > 9) analysis = 'PH值偏高，可能受碱性废水排放影响。';
            } else if (config && !config.higherBetter && outlier.value > config.level3) {
                analysis = `超过Ⅲ类标准(${config.level3})，可能存在严重污染。`;
            } else if (config && config.higherBetter && outlier.value < config.level3) {
                analysis = `低于Ⅲ类标准(${config.level3})，溶解氧不足。`;
            }
            if (!analysis) analysis = '数值偏离正常范围，建议检查监测设备。';
            
            document.getElementById('outlierDetail').innerHTML = `
                <div class="outlier-item"><div class="outlier-label">指标浓度</div><div class="outlier-value" style="color: #ef4444;">${outlier.value} ${indicator.unit}</div></div>
                <div class="outlier-item"><div class="outlier-label">监测时间</div><div class="outlier-value">${outlier.date}</div></div>
                <div class="outlier-item"><div class="outlier-label">监测站点</div><div class="outlier-value">${outlier.location}</div></div>
                <div class="outlier-item"><div class="outlier-label">所在省份</div><div class="outlier-value">${outlier.province}</div></div>
                ${outlier.exceeded ? `<div class="outlier-item"><div class="outlier-label">超标情况</div><div class="outlier-value" style="color: #ef4444;">${outlier.exceeded}</div></div>` : ''}
                <div style="padding: 12px; background: rgba(14, 165, 233, 0.1); border-radius: 8px; margin-top: 10px;"><div style="font-size: 12px; color: #0ea5e9; margin-bottom: 8px; font-weight: 600;"><i class="fa fa-info-circle"></i> 异常原因分析</div><div style="font-size: 12px; color: #94a3b8; line-height: 1.6;">${analysis}</div></div>
            `;
            modal.classList.add('active');
        }
        
        function closeOutlierModal() {
            document.getElementById('outlierModal').classList.remove('active');
        }
        
        function renderEmptyState(message) {
            clearChartInstances();
            boxplotData = { indicators: [], outliers: [], overall_stability: '--', sample_count: 0 };

            const boxplotGrid = document.getElementById('boxplotGrid');
            const statsTableBody = document.getElementById('statsTableBody');
            const thresholdContainer = document.getElementById('thresholdContainer');
            const stabilityList = document.getElementById('stabilityList');

            boxplotGrid.innerHTML = `
                <div style="grid-column: 1 / -1; min-height: 280px; display: flex; align-items: center; justify-content: center; color: #94a3b8; border: 1px dashed rgba(148,163,184,0.3); border-radius: 16px; background: rgba(15,23,42,0.35);">
                    ${message}
                </div>
            `;
            statsTableBody.innerHTML = `
                <tr>
                    <td colspan="7" style="text-align: center; color: #94a3b8; padding: 24px 12px;">${message}</td>
                </tr>
            `;
            thresholdContainer.innerHTML = `
                <div class="threshold-item">
                    <div class="threshold-header">
                        <div class="threshold-name">真实阈值面板</div>
                        <div class="threshold-range">${message}</div>
                    </div>
                </div>
            `;
            document.getElementById('overallStability').textContent = '--';
            stabilityList.innerHTML = `
                <div class="stability-item" style="justify-content: center; color: #94a3b8;">
                    ${message}
                </div>
            `;
            closeOutlierModal();
            showToast(message);
        }

        function showToast(message) {
            const existing = document.querySelector('.toast-message');
            if (existing) existing.remove();

            const toast = document.createElement('div');
            toast.className = 'toast-message';
            toast.innerHTML = `
                <div style="
                    position: fixed;
                    top: 80px;
                    left: 50%;
                    transform: translateX(-50%);
                    background: rgba(15, 23, 42, 0.92);
                    color: white;
                    padding: 12px 24px;
                    border-radius: 8px;
                    font-size: 14px;
                    z-index: 10000;
                    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
                    border: 1px solid rgba(148, 163, 184, 0.25);
                ">${message}</div>
            `;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        document.getElementById('outlierModal').addEventListener('click', function(e) { if (e.target === this) closeOutlierModal(); });
    </script>
</body>
</html>
