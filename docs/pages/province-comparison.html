            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            min-height: 100%;
            overflow-x: hidden;
            overflow-y: auto;
            font-family: 'Microsoft YaHei', sans-serif;

        }
        
        ::-webkit-scrollbar-track {

        }
        
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, rgba(14, 165, 233, 0.5), rgba(34, 197, 94, 0.5));

            left: 0;
            width: 100%;
            height: 100%;

                linear-gradient(90deg, rgba(14, 165, 233, 0.03) 1px, transparent 1px);

            pointer-events: none;
            z-index: 0;

        /* 椤堕儴瀵艰埅 */

            border-radius: 12px;
            position: relative;
            overflow: hidden;
        }
        
        .conclusion-bar::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, 
                transparent 0%, 
                #0ea5e9 20%, 
                #22c55e 50%, 
                #0ea5e9 80%, 
                transparent 100%);
        }
        
        .conclusion-tag {
            flex: 1;
            padding: 15px 20px;
            background: rgba(15, 23, 42, 0.6);
            border-radius: 10px;
            border: 1px solid;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.3s;

        .conclusion-tag:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }

            border-color: rgba(0, 228, 0, 0.4);
            background: linear-gradient(135deg, rgba(0, 228, 0, 0.1) 0%, rgba(15, 23, 42, 0.8) 100%);
        }
        
        .conclusion-tag.tag-2 {
            border-color: rgba(14, 165, 233, 0.4);
            background: linear-gradient(135deg, rgba(14, 165, 233, 0.1) 0%, rgba(15, 23, 42, 0.8) 100%);
        }
        
        .tag-icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        
        .tag-1 .tag-icon {
            background: rgba(0, 228, 0, 0.2);
            color: #00e400;
        }
        
        .tag-2 .tag-icon {
            background: rgba(14, 165, 233, 0.2);
            color: #0ea5e9;
        }
        
        .tag-content {
            flex: 1;
        }
        
        .tag-title {
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 4px;
        }
        
        .tag-value {
            font-size: 16px;
            font-weight: bold;
            color: #e2e8f0;
            line-height: 1.5;
        }
        
        .tag-highlight {
            color: #22c55e;
            font-weight: bold;
        }
        
        .rank-item {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            margin-right: 8px;
        }
        
        .rank-number {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            font-size: 12px;
            font-weight: bold;
        }
        
        .rank-1 { background: linear-gradient(135deg, #ffd700, #ffaa00); color: #000; }
        .rank-2 { background: linear-gradient(135deg, #c0c0c0, #a0a0a0); color: #000; }
        .rank-3 { background: linear-gradient(135deg, #cd7f32, #b87333); color: #fff; }
        .rank-other { background: rgba(14, 165, 233, 0.3); color: #e2e8f0; }
        
        /* 涓讳綋鍐呭鍖?*/
        .content-area {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            min-height: 600px;
        }
        
        /* 鍥捐〃鍗＄墖 */
        .chart-card {
            background: linear-gradient(145deg, rgba(15, 23, 42, 0.8) 0%, rgba(30, 41, 59, 0.6) 100%);
            border: 1px solid rgba(14, 165, 233, 0.2);
            border-radius: 12px;
            padding: 20px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        /* 绉戞妧鎰熷洓瑙掕楗?*/
        .chart-card::before,
        .chart-card::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid #0ea5e9;
        }
        
        .chart-card::before {
            top: 0;
            left: 0;
            border-right: none;
            border-bottom: none;
            border-top-left-radius: 8px;
        }
        
        .chart-card::after {
            bottom: 0;
            right: 0;
            border-left: none;
            border-top: none;
            border-bottom-right-radius: 8px;
        }
        
        .corner-decoration {
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid #0ea5e9;
        }
        
        .corner-tl { top: 0; left: 0; border-right: none; border-bottom: none; border-top-left-radius: 8px; }
        .corner-tr { top: 0; right: 0; border-left: none; border-bottom: none; border-top-right-radius: 8px; }
        .corner-bl { bottom: 0; left: 0; border-right: none; border-top: none; border-bottom-left-radius: 8px; }
        .corner-br { bottom: 0; right: 0; border-left: none; border-top: none; border-bottom-right-radius: 8px; }
        
        /* 鍗＄墖鏍囬 */
        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(14, 165, 233, 0.2);
            flex-shrink: 0;
        }
        
        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: #e2e8f0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .card-title i {
            color: #0ea5e9;
            font-size: 18px;
        }
        
        .card-subtitle {
            font-size: 12px;
            color: #64748b;
        }
        
        /* 鍥捐〃瀹瑰櫒 */
        .chart-container {
            flex: 1;
            min-height: 0;
            position: relative;
        }
        
        /* 搴曢儴鍒嗘瀽鍖?*/
        .bottom-section {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            min-height: 400px;
        }
        
        /* 鎺掑悕琛ㄦ牱寮?*/
        .ranking-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        
        .ranking-table th,
        .ranking-table td {
            padding: 12px 10px;
            text-align: center;
            border-bottom: 1px solid rgba(14, 165, 233, 0.1);
        }
        
        .ranking-table th {
            background: rgba(14, 165, 233, 0.15);
            color: #0ea5e9;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
            user-select: none;
        }
        
        .ranking-table th:hover {
            background: rgba(14, 165, 233, 0.25);
        }
        
        .ranking-table th.sortable::after {
            content: ' 鈬?;
            color: #64748b;
            font-size: 10px;
        }
        
        .ranking-table th.sort-asc::after {
            content: ' 鈫?;
            color: #22c55e;
        }
        
        .ranking-table th.sort-desc::after {
            content: ' 鈫?;
            color: #22c55e;
        }
        
        .ranking-table td {
            color: #e2e8f0;
        }
        
        .ranking-table tr:hover td {
            background: rgba(14, 165, 233, 0.05);
        }
        
        .ranking-table .province-name {
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .rank-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            font-size: 12px;
            font-weight: bold;
        }
        
        /* 绠℃帶寤鸿鍗＄墖 */
        .suggestion-card {
            padding: 15px;
            background: rgba(15, 23, 42, 0.5);
            border-radius: 10px;
            border-left: 3px solid #0ea5e9;
            margin-bottom: 12px;
        }
        
        .suggestion-card:last-child {
            margin-bottom: 0;
        }
        
        .suggestion-title {
            font-size: 14px;
            font-weight: 600;
            color: #e2e8f0;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .suggestion-title i {
            color: #0ea5e9;
        }
        
        .suggestion-content {
            font-size: 12px;
            color: #94a3b8;
            line-height: 1.6;
        }
        
        .suggestion-tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            margin-top: 8px;
            margin-right: 5px;
        }
        
        .tag-priority {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }
        
        .tag-improve {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
            border: 1px solid rgba(34, 197, 94, 0.3);
        }
        
        .tag-maintain {
            background: rgba(14, 165, 233, 0.2);
            color: #0ea5e9;
            border: 1px solid rgba(14, 165, 233, 0.3);
        }
        
        /* 瀵煎嚭鎸夐挳 */
        .export-btn {
            padding: 8px 16px;
            background: linear-gradient(135deg, rgba(14, 165, 233, 0.2), rgba(34, 197, 94, 0.2));
            border: 1px solid rgba(14, 165, 233, 0.4);
            border-radius: 6px;
            color: #0ea5e9;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .export-btn:hover {
            background: linear-gradient(135deg, rgba(14, 165, 233, 0.3), rgba(34, 197, 94, 0.3));
            transform: translateY(-1px);
        }
        
        /* 鍦板浘寮圭獥 */
        .map-popup {
            position: absolute;
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid rgba(14, 165, 233, 0.4);
            border-radius: 12px;
            padding: 20px;
            min-width: 320px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            z-index: 1000;
            display: none;
        }
        
        .map-popup.active {
            display: block;
        }
        
        .popup-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(14, 165, 233, 0.2);
        }
        
        .popup-title {
            font-size: 18px;
            font-weight: bold;
            color: #e2e8f0;
        }
        
        .popup-close {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.4);
            color: #ef4444;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }
        
        .popup-close:hover {
            background: rgba(239, 68, 68, 0.3);
        }
        
        .popup-content {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .indicator-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            background: rgba(14, 165, 233, 0.1);
            border-radius: 8px;
        }
        
        .indicator-info {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .indicator-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }
        
        .indicator-icon.do { background: rgba(14, 165, 233, 0.2); color: #0ea5e9; }
        .indicator-icon.nh { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
        .indicator-icon.tp { background: rgba(139, 92, 246, 0.2); color: #8b5cf6; }
        
        .indicator-name-popup {
            font-size: 13px;
            color: #94a3b8;
        }
        
        .indicator-value {
            font-size: 16px;
            font-weight: bold;
            color: #e2e8f0;
        }
        
        .indicator-level {
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 500;
        }
        
        .level-1 { background: rgba(0, 228, 0, 0.2); color: #00e400; border: 1px solid rgba(0, 228, 0, 0.3); }
        .level-2 { background: rgba(255, 255, 0, 0.2); color: #ffff00; border: 1px solid rgba(255, 255, 0, 0.3); }
        .level-3 { background: rgba(255, 126, 0, 0.2); color: #ff7e00; border: 1px solid rgba(255, 126, 0, 0.3); }
        
        .rank-info {
            display: flex;
            gap: 15px;
            padding: 12px;
            background: rgba(34, 197, 94, 0.1);
            border-radius: 8px;
            margin-top: 5px;
        }
        
        .rank-box {
            flex: 1;
            text-align: center;
        }
        
        .rank-label {
            font-size: 11px;
            color: #94a3b8;
            margin-bottom: 4px;
        }
        
        .rank-value {
            font-size: 18px;
            font-weight: bold;
            color: #22c55e;
        }
        
        .mini-chart {
            height: 100px;
            margin-top: 10px;
            background: rgba(14, 165, 233, 0.05);
            border-radius: 8px;
        }
        
        /* 鍝嶅簲寮?*/
        @media (max-width: 1400px) {
            .content-area {
                grid-template-columns: 1fr;
            }
            .bottom-section {
                grid-template-columns: 1fr;
            }
        }
        
        /* 鍔ㄧ敾 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .animate-fade-in {
            animation: fadeIn 0.5s ease-out;
        }
        
        /* 姘磋川绛夌骇鍥句緥 */
        .level-legend {
            display: flex;
            gap: 15px;
            align-items: center;
            padding: 8px 15px;
            background: rgba(15, 23, 42, 0.5);
            border-radius: 20px;
            font-size: 11px;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 2px;
        }
    </style>
    <script src="../config/site.config.js"></script>
    <script src="../config/runtime-config.js"></script>
</head>

    <script>
        // API鍩虹URL
        const API_BASE = (() => {
            if (window.location.protocol === 'file:') {
                return 'http://127.0.0.1:5001/api';
            }
            return `${window.location.origin}/api`;
        })();
        
        let charts = {};
        let provinceData = [];
        let mapData = [];
        let sortField = 'score';
        let sortAsc = false;
        
        // 姘磋川绛夌骇鏍囧噯
        const waterQualityStandards = {
            do: { level1: 7.5, level2: 6.0, level3: 5.0 },
            nh: { level1: 0.15, level2: 0.5, level3: 1.0 },
            tp: { level1: 0.02, level2: 0.1, level3: 0.2 }
        };
        
        const provinceTrendCache = {};
        
        // 鍒濆鍖?
        document.addEventListener('DOMContentLoaded', function() {
            initCharts();
            loadRealData();
            updateTime();
            setInterval(updateTime, 1000);
            initSortHandlers();
            
            window.addEventListener('resize', function() {
                Object.values(charts).forEach(chart => chart && chart.resize());
            });
        });
        
        // 鏇存柊鏃堕棿
        function updateTime() {
            const now = new Date();
            const timeStr = now.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
            document.getElementById('currentTime').textContent = timeStr;
        }
        
        // 杩斿洖澶у睆
        function goBack() {
            window.location.href = 'dashboard.html';
        }
        
        // 鍒濆鍖栧浘琛?
        function initCharts() {
            charts.bar = echarts.init(document.getElementById('barChart'));
            charts.map = echarts.init(document.getElementById('mapChart'));
        }
        
        // 鍔犺浇鐪熷疄鏁版嵁
        async function loadRealData() {
            try {
                showLoading();
                console.log('[DEBUG] Starting to load data from:', API_BASE);
                
                // 骞惰鍔犺浇鏁版嵁
                const [provinceRes, mapRes, overviewRes] = await Promise.all([
                    fetch(`${API_BASE}/dashboard/province-comparison`).then(r => {
                        console.log('[DEBUG] Province comparison response:', r.status);
                        return r.json();
                    }).catch(e => {
                        console.error('[DEBUG] Province comparison error:', e);
                        return { success: false, error: e.message };
                    }),
                    fetch(`${API_BASE}/dashboard/map-data`).then(r => {
                        console.log('[DEBUG] Map data response:', r.status);
                        return r.json();
                    }).catch(e => {
                        console.error('[DEBUG] Map data error:', e);
                        return { success: false, error: e.message };
                    }),
                    fetch(`${API_BASE}/dashboard/overview-stats`).then(r => {
                        console.log('[DEBUG] Overview stats response:', r.status);
                        return r.json();
                    }).catch(e => {
                        console.error('[DEBUG] Overview stats error:', e);
                        return { success: false, error: e.message };
                    })
                ]);
                
                console.log('[DEBUG] Province response:', provinceRes);
                console.log('[DEBUG] Map response:', mapRes);
                
                // 澶勭悊鐪佷唤瀵规瘮鏁版嵁
                if (provinceRes.success && provinceRes.data && provinceRes.data.provinces && provinceRes.data.provinces.length > 0) {
                    console.log('[DEBUG] Processing province data:', provinceRes.data);
                    processProvinceData(provinceRes.data);
                    renderBarChart();
                    updateRankingTable();
                    updateSuggestions();
                } else {
                    const message = (provinceRes.data && provinceRes.data.message) || provinceRes.error || '鏆傛棤鐪熷疄鐪佷唤瀵规瘮鏁版嵁';
                    provinceData = [];
                    console.error('[DEBUG] Province comparison unavailable:', message);
                    renderBarEmptyState(message);
                    updateRankingTable();
                    updateSuggestions();
                    showToast(message);
                }
                
                // 澶勭悊鍦板浘鏁版嵁
                if (mapRes.success && mapRes.data && mapRes.data.length > 0) {
                    mapData = mapRes.data;
                    renderMap();
                } else {
                    console.warn('[DEBUG] Map data unavailable');
                    mapData = [];
                    renderMapFallback((mapRes.data && mapRes.data.message) || mapRes.error || '鏆傛棤鐪熷疄绔欑偣鍦板浘鏁版嵁');
                }
                
                hideLoading();
            } catch (error) {
                console.error('[DEBUG] Global error:', error);
                provinceData = [];
                mapData = [];
                renderBarEmptyState('鏁版嵁鍔犺浇澶辫触锛屾湭鍔犺浇鍒扮湡瀹炵渷浠藉姣旀暟鎹?);
                renderMapFallback('鏁版嵁鍔犺浇澶辫触锛屾湭鍔犺浇鍒扮湡瀹炵珯鐐瑰湴鍥炬暟鎹?);
                updateRankingTable();
                updateSuggestions();
                showToast('鏁版嵁鍔犺浇澶辫触锛屾湭鍔犺浇鍒扮湡瀹炵渷浠藉姣旀暟鎹?);
                hideLoading();
            }
        }

        function renderChartEmpty(chart, title, message) {
            if (!chart) return;
            chart.clear();
            chart.setOption({
                backgroundColor: 'transparent',
                title: {
                    text: title,
                    subtext: message,
                    left: 'center',
                    top: 'center',
                    textStyle: { color: '#e2e8f0', fontSize: 16 },
                    subtextStyle: { color: '#94a3b8', fontSize: 12 }
                }
            }, true);
        }

        function renderBarEmptyState(message) {
            renderChartEmpty(charts.bar, '鍏渷甯傛按璐ㄥ姣?, message);
            closePopup();
        }

        function getProvinceSuggestion(province) {
            const data = provinceData.find(item => item.province === province);
            if (!data) {
                return {
                    advantage: '鏆傛棤鐪熷疄璇勪及缁撴灉',
                    weakness: '鏆傛棤鐪熷疄璇勪及缁撴灉',
                    priority: '寰呰ˉ鍏?,
                    tags: ['鏆傛棤鐪熷疄鏁版嵁']
                };
            }

            const rank = provinceData.findIndex(item => item.province === province) + 1;
            const strengths = [
                {
                    key: 'do',
                    score: data.do / waterQualityStandards.do.level1,
                    advantage: `婧惰В姘у潎鍊间负 ${data.do} mg/L锛屾槸褰撳墠鏈€绐佸嚭鐨勪紭鍔挎寚鏍嘸,
                    weakness: `婧惰В姘ц窛绂烩厾绫荤洰鏍囦粛宸?${(waterQualityStandards.do.level1 - data.do).toFixed(2)} mg/L`
                },
                {
                    key: 'nh',
                    score: waterQualityStandards.nh.level1 / Math.max(data.nh, 0.001),
                    advantage: `姘ㄦ爱鍧囧€间负 ${data.nh} mg/L锛屾薄鏌撴帶鍒惰〃鐜拌緝濂絗,
                    weakness: `姘ㄦ爱杈冣厾绫荤洰鏍囬珮鍑?${(data.nh - waterQualityStandards.nh.level1).toFixed(3)} mg/L`
                },
                {
                    key: 'tp',
                    score: waterQualityStandards.tp.level1 / Math.max(data.tp, 0.001),
                    advantage: `鎬荤７鍧囧€间负 ${data.tp} mg/L锛岃惀鍏荤洂鎺у埗鐩稿绋冲畾`,
                    weakness: `鎬荤７杈冣厾绫荤洰鏍囬珮鍑?${(data.tp - waterQualityStandards.tp.level1).toFixed(3)} mg/L`
                }
            ];

            const sortedByStrength = [...strengths].sort((a, b) => b.score - a.score);
            const bestMetric = sortedByStrength[0];
            const weakestMetric = sortedByStrength[sortedByStrength.length - 1];

            let priority = '鎻愬崌';
            if (rank <= 2 && data.level === '鈪犵被') {
                priority = '缁存寔';
            } else if (rank >= Math.max(4, provinceData.length - 1) || data.level === '鈪㈢被') {
                priority = '閲嶇偣鏁存不';
            }

            const tags = [];
            if (bestMetric.key === 'do') tags.push('婧惰В姘т紭鍔?);
            if (bestMetric.key === 'nh') tags.push('姘ㄦ爱绋虫帶');
            if (bestMetric.key === 'tp') tags.push('鎬荤７绋虫帶');
            if (weakestMetric.key === 'do' && data.do < waterQualityStandards.do.level1) tags.push('琛ユ哀鎻愬崌');
            if (weakestMetric.key === 'nh' && data.nh > waterQualityStandards.nh.level1) tags.push('姘ㄦ爱鍓婂噺');
            if (weakestMetric.key === 'tp' && data.tp > waterQualityStandards.tp.level1) tags.push('鎬荤７娌荤悊');
            tags.push(rank <= 3 ? '淇濇寔浼樺娍' : '鎸佺画浼樺寲');

            return {
                advantage: bestMetric.advantage,
                weakness: weakestMetric.score >= 1 ? '鍚勬牳蹇冩寚鏍囨暣浣撶ǔ瀹氾紝寤鸿淇濇寔鐜版湁娌荤悊鑺傚' : weakestMetric.weakness,
                priority,
                tags
            };
        }
        
        // 澶勭悊鐪佷唤鏁版嵁
        function processProvinceData(data) {
            provinceData = data.provinces.map((province, index) => {
                const do_value = Number(data.dissolved_oxygen[index] ?? 0);
                const nh_value = Number(data.ammonia_nitrogen[index] ?? 0);
                const tp_value = Number(data.total_phosphorus[index] ?? 0);
                
                // 璁＄畻缁煎悎寰楀垎锛堟弧鍒?00锛?
                // DO: 婊″垎30鍒嗭紙>=7.5寰?0鍒嗭級
                // NH: 婊″垎40鍒嗭紙<=0.15寰?0鍒嗭級
                // TP: 婊″垎30鍒嗭紙<=0.02寰?0鍒嗭級
                const do_score = Math.min(30, (do_value / 7.5) * 30);
                const nh_score = nh_value <= 0.15 ? 40 : Math.max(0, 40 - (nh_value - 0.15) * 20);
                const tp_score = tp_value <= 0.02 ? 30 : Math.max(0, 30 - (tp_value - 0.02) * 100);
                const total_score = do_score + nh_score + tp_score;
                
                // 鍒ゆ柇姘磋川绛夌骇
                let level = '鈪㈢被';
                let levelClass = 'level-3';
                if (do_value >= 7.5 && nh_value <= 0.15 && tp_value <= 0.02) {
                    level = '鈪犵被';
                    levelClass = 'level-1';
                } else if (do_value >= 6.0 && nh_value <= 0.5 && tp_value <= 0.1) {
                    level = '鈪＄被';
                    levelClass = 'level-2';
                }
                
                return {
                    province,
                    do: do_value,
                    nh: nh_value,
                    tp: tp_value,
                    score: total_score,
                    level,
                    levelClass
                };
            });
            
            // 鎸夌患鍚堝緱鍒嗘帓搴?
            provinceData.sort((a, b) => b.score - a.score);
        }
        
        // 娓叉煋鏌辩姸鍥?
        function renderBarChart() {
            const provinces = provinceData.map(d => d.province.replace('鐪?, '').replace('甯?, ''));
            const doData = provinceData.map(d => ({
                value: d.do,
                itemStyle: { color: d.do >= 7.5 ? '#00e400' : d.do >= 6.0 ? '#ffff00' : '#ff7e00' }
            }));
            const nhData = provinceData.map(d => ({
                value: d.nh,
                itemStyle: { color: d.nh <= 0.15 ? '#00e400' : d.nh <= 0.5 ? '#ffff00' : '#ff7e00' }
            }));
            const tpData = provinceData.map(d => ({
                value: d.tp,
                itemStyle: { color: d.tp <= 0.02 ? '#00e400' : d.tp <= 0.1 ? '#ffff00' : '#ff7e00' }
            }));
            
            const option = {
                backgroundColor: 'transparent',
                tooltip: {
                    trigger: 'axis',
                    axisPointer: { type: 'shadow' },
                    formatter: function(params) {
                        const index = params[0].dataIndex;
                        const data = provinceData[index];
                        let html = `<div style="font-weight:bold;margin-bottom:5px">${data.province}</div>`;
                        params.forEach(p => {
                            const indicator = p.seriesName;
                            const value = p.value;
                            let level = '';
                            let diff = '';
                            if (indicator === '婧惰В姘?) {
                                level = value >= 7.5 ? '鈪犵被' : value >= 6.0 ? '鈪＄被' : '鈪㈢被';
                                diff = value >= 7.5 ? '杈炬爣' : `璺濃厾绫诲樊${(7.5 - value).toFixed(2)}`;
                            } else if (indicator === '姘ㄦ爱') {
                                level = value <= 0.15 ? '鈪犵被' : value <= 0.5 ? '鈪＄被' : '鈪㈢被';
                                diff = value <= 0.15 ? '杈炬爣' : `璺濃厾绫诲樊${(value - 0.15).toFixed(3)}`;
                            } else {
                                level = value <= 0.02 ? '鈪犵被' : value <= 0.1 ? '鈪＄被' : '鈪㈢被';
                                diff = value <= 0.02 ? '杈炬爣' : `璺濃厾绫诲樊${(value - 0.02).toFixed(3)}`;
                            }
                            html += `<div style="display:flex;align-items:center;gap:8px;margin:3px 0">
                                <span style="display:inline-block;width:10px;height:10px;background:${p.color};border-radius:2px"></span>
                                <span>${indicator}: <b>${value}</b> (${level}, ${diff})
                            </div>`;
                        });
                        return html;
                    }
                },
                legend: {
                    data: ['婧惰В姘?, '姘ㄦ爱', '鎬荤７'],
                    textStyle: { color: '#94a3b8', fontSize: 12 },
                    top: 0
                },
                grid: {
                    top: '15%',
                    left: '3%',
                    right: '4%',
                    bottom: '10%',
                    containLabel: true
                },
                xAxis: {
                    type: 'category',
                    data: provinces,
                    axisLabel: {
                        color: '#e2e8f0',
                        fontSize: 13,
                        fontWeight: 'bold'
                    },
                    axisLine: { lineStyle: { color: 'rgba(14, 165, 233, 0.3)' } }
                },
                yAxis: [
                    {
                        type: 'value',
                        name: '婧惰В姘?mg/L)',
                        position: 'left',
                        axisLabel: { color: '#94a3b8', fontSize: 11 },
                        splitLine: { lineStyle: { color: 'rgba(148, 163, 184, 0.1)' } },
                        nameTextStyle: { color: '#0ea5e9' }
                    },
                    {
                        type: 'value',
                        name: '姘ㄦ爱/鎬荤７(mg/L)',
                        position: 'right',
                        axisLabel: { color: '#94a3b8', fontSize: 11 },
                        nameTextStyle: { color: '#f59e0b' }
                    }
                ],
                series: [
                    {
                        name: '婧惰В姘?,
                        type: 'bar',
                        data: doData,
                        barWidth: '20%',
                        label: {
                            show: true,
                            position: 'top',
                            color: '#0ea5e9',
                            fontSize: 10,
                            formatter: '{c}'
                        }
                    },
                    {
                        name: '姘ㄦ爱',
                        type: 'bar',
                        yAxisIndex: 1,
                        data: nhData,
                        barWidth: '20%',
                        label: {
                            show: true,
                            position: 'top',
                            color: '#f59e0b',
                            fontSize: 10,
                            formatter: '{c}'
                        }
                    },
                    {
                        name: '鎬荤７',
                        type: 'bar',
                        yAxisIndex: 1,
                        data: tpData,
                        barWidth: '20%',
                        label: {
                            show: true,
                            position: 'top',
                            color: '#8b5cf6',
                            fontSize: 10,
                            formatter: '{c}'
                        }
                    }
                ]
            };
            
            charts.bar.setOption(option);
            
            // 鐐瑰嚮浜嬩欢
            charts.bar.on('click', function(params) {
                const index = params.dataIndex;
                const province = provinceData[index].province;
                focusMapOnProvince(province);
                showProvincePopup(province);
            });
        }
        
        // 娓叉煋鍦板浘
        function renderMap() {
            fetch('https://geo.datav.aliyun.com/areas_v3/bound/100000_full.json')
                .then(res => res.json())
                .then(geoJson => {
                    echarts.registerMap('china', geoJson);
                    
                    // 楂樹寒鍏渷甯?
                    const highlightProvinces = ['鍖椾含甯?, '澶╂触甯?, '娌冲寳鐪?, '灞辫タ鐪?, '灞变笢鐪?, '娌冲崡鐪?];
                    
                    const option = {
                        backgroundColor: 'transparent',
                        tooltip: {
                            trigger: 'item',
                            formatter: function(params) {
                                if (params.dataType === 'geo') {
                                    return highlightProvinces.includes(params.name) ? 
                                        `<b>${params.name}</b><br/>鐐瑰嚮鏌ョ湅璇︽儏` : params.name;
                                }
                                const d = params.data;
                                return `<div style="font-weight:bold">${d.name}</div>
                                        <div>婧惰В姘? ${d.dissolved_oxygen} mg/L</div>
                                        <div>姘ㄦ爱: ${d.ammonia_nitrogen} mg/L</div>
                                        <div>绛夌骇: ${d.level}</div>`;
                            }
                        },
                        geo: {
                            map: 'china',
                            roam: true,
                            zoom: 5,
                            center: [115, 37],
                            label: {
                                show: true,
                                color: '#e2e8f0',
                                fontSize: 11,
                                fontWeight: 'bold'
                            },
                            itemStyle: {
                                areaColor: 'rgba(30, 41, 59, 0.8)',
                                borderColor: 'rgba(14, 165, 233, 0.3)',
                                borderWidth: 1
                            },
                            emphasis: {
                                label: { color: '#fff' },
                                itemStyle: {
                                    areaColor: 'rgba(14, 165, 233, 0.4)'
                                }
                            },
                            select: {
                                itemStyle: {
                                    areaColor: 'rgba(34, 197, 94, 0.5)'
                                }
                            },
                            regions: highlightProvinces.map(p => ({
                                name: p,
                                itemStyle: {
                                    areaColor: 'rgba(14, 165, 233, 0.2)',
                                    borderColor: '#0ea5e9',
                                    borderWidth: 2
                                },
                                emphasis: {
                                    itemStyle: {
                                        areaColor: 'rgba(14, 165, 233, 0.5)'
                                    }
                                }
                            }))
                        },
                        series: [{
                            type: 'effectScatter',
                            coordinateSystem: 'geo',
                            data: mapData,
                            symbolSize: function(val) {
                                return Math.max(8, Math.min(20, val[2] || 8));
                            },
                            showEffectOn: 'render',
                            rippleEffect: {
                                brushType: 'stroke',
                                scale: 3
                            },
                            itemStyle: {
                                color: function(params) {
                                    return params.data.color || '#0ea5e9';
                                }
                            }
                        }]
                    };
                    
                    charts.map.setOption(option);
                    
                    // 鍦板浘鐐瑰嚮浜嬩欢
                    charts.map.on('click', function(params) {
                        if (highlightProvinces.includes(params.name)) {
                            showProvincePopup(params.name);
                        }
                    });
                })
                .catch(err => {
                    console.error('[DEBUG] Map load failed:', err);
                    renderMapFallback('鍦板浘搴曞浘鍔犺浇澶辫触锛屾殏鏃犳硶灞曠ず鐪熷疄绔欑偣鍒嗗竷');
                });
        }
        
        // 鍦板浘鍔犺浇澶辫触鏃剁殑鍥為€€鏄剧ず
        function renderMapFallback(message = '鏆傛棤鐪熷疄绔欑偣鍦板浘鏁版嵁') {
            console.log('[DEBUG] Rendering map empty state');
            charts.map.clear();
            charts.map.setOption({
                backgroundColor: 'transparent',
                title: {
                    text: '鍏渷甯傜洃娴嬬珯鐐瑰垎甯?,
                    subtext: message,
                    left: 'center',
                    top: 'center',
                    textStyle: { color: '#e2e8f0', fontSize: 16 },
                    subtextStyle: { color: '#64748b', fontSize: 12 }
                }
            }, true);
        }
        
        // 鑱氱劍鍦板浘鍒版寚瀹氱渷浠?
        function focusMapOnProvince(province) {
            // 鍦板浘鑱氱劍閫昏緫
            const provinceCenters = {
                '鍖椾含甯?: [116.4, 39.9],
                '澶╂触甯?: [117.2, 39.1],
                '娌冲寳鐪?: [114.5, 38.0],
                '灞辫タ鐪?: [112.5, 37.9],
                '灞变笢鐪?: [117.0, 36.7],
                '娌冲崡鐪?: [113.6, 34.8]
            };
            
            const center = provinceCenters[province];
            if (center) {
                charts.map.setOption({
                    geo: {
                        center: center,
                        zoom: 7
                    }
                });
            }
        }
        
        // 鏄剧ず鐪佷唤寮圭獥
        function showProvincePopup(province) {
            const data = provinceData.find(d => d.province === province);
            if (!data) return;
            
            const popup = document.getElementById('mapPopup');
            const title = document.getElementById('popupTitle');
            const content = document.getElementById('popupContent');
            
            title.textContent = province;
            
            const rank = provinceData.findIndex(d => d.province === province) + 1;
            const suggestion = getProvinceSuggestion(province);
            
            content.innerHTML = `
                <div class="indicator-row">
                    <div class="indicator-info">
                        <div class="indicator-icon do"><i class="fa fa-tint"></i></div>
                        <div class="indicator-name-popup">婧惰В姘?/div>
                    </div>
                    <div style="display:flex;align-items:center;gap:10px">
                        <div class="indicator-value" style="color:#0ea5e9">${data.do}</div>
                        <div class="indicator-level ${data.do >= 7.5 ? 'level-1' : data.do >= 6.0 ? 'level-2' : 'level-3'}">
                            ${data.do >= 7.5 ? '鈪犵被' : data.do >= 6.0 ? '鈪＄被' : '鈪㈢被'}
                        </div>
                    </div>
                </div>
                <div class="indicator-row">
                    <div class="indicator-info">
                        <div class="indicator-icon nh"><i class="fa fa-filter"></i></div>
                        <div class="indicator-name-popup">姘ㄦ爱</div>
                    </div>
                    <div style="display:flex;align-items:center;gap:10px">
                        <div class="indicator-value" style="color:#f59e0b">${data.nh}</div>
                        <div class="indicator-level ${data.nh <= 0.15 ? 'level-1' : data.nh <= 0.5 ? 'level-2' : 'level-3'}">
                            ${data.nh <= 0.15 ? '鈪犵被' : data.nh <= 0.5 ? '鈪＄被' : '鈪㈢被'}
                        </div>
                    </div>
                </div>
                <div class="indicator-row">
                    <div class="indicator-info">
                        <div class="indicator-icon tp"><i class="fa fa-flask"></i></div>
                        <div class="indicator-name-popup">鎬荤７</div>
                    </div>
                    <div style="display:flex;align-items:center;gap:10px">
                        <div class="indicator-value" style="color:#8b5cf6">${data.tp}</div>
                        <div class="indicator-level ${data.tp <= 0.02 ? 'level-1' : data.tp <= 0.1 ? 'level-2' : 'level-3'}">
                            ${data.tp <= 0.02 ? '鈪犵被' : data.tp <= 0.1 ? '鈪＄被' : '鈪㈢被'}
                        </div>
                    </div>
                </div>
                <div class="rank-info">
                    <div class="rank-box">
                        <div class="rank-label">缁煎悎鎺掑悕</div>
                        <div class="rank-value">绗?{rank}鍚?/div>
                    </div>
                    <div class="rank-box">
                        <div class="rank-label">缁煎悎寰楀垎</div>
                        <div class="rank-value">${data.score.toFixed(1)}</div>
                    </div>
                </div>
                <div style="margin-top:10px;padding:10px;background:rgba(14,165,233,0.1);border-radius:8px">
                    <div style="font-size:12px;color:#94a3b8;margin-bottom:5px"><i class="fa fa-star" style="color:#f59e0b;margin-right:5px"></i>鏍稿績浼樺娍</div>
                    <div style="font-size:13px;color:#e2e8f0">${suggestion.advantage}</div>
                </div>
                <div style="padding:10px;background:rgba(239,68,68,0.1);border-radius:8px">
                    <div style="font-size:12px;color:#94a3b8;margin-bottom:5px"><i class="fa fa-exclamation-circle" style="color:#ef4444;margin-right:5px"></i>鎻愬崌鐭澘</div>
                    <div style="font-size:13px;color:#e2e8f0">${suggestion.weakness}</div>
                </div>
                <div class="mini-chart" id="miniChart_${province}"></div>
            `;
            
            popup.classList.add('active');
            popup.style.left = '50%';
            popup.style.top = '50%';
            popup.style.transform = 'translate(-50%, -50%)';
            
            // 娓叉煋杩蜂綘瓒嬪娍鍥?            setTimeout(() => renderMiniChart(province), 100);
        }
        
        // 鍏抽棴寮圭獥
        function closePopup() {
            document.getElementById('mapPopup').classList.remove('active');
        }
        
        async function fetchProvinceTrendData(province) {
            if (Object.prototype.hasOwnProperty.call(provinceTrendCache, province)) {
                return provinceTrendCache[province];
            }

            try {
                const response = await fetch(`${API_BASE}/dashboard/data-by-province?province=${encodeURIComponent(province)}`);
                const result = await response.json();
                if (result.success && result.data && result.data.line && result.data.line.dates && result.data.line.dates.length > 0) {
                    provinceTrendCache[province] = result.data.line;
                    return provinceTrendCache[province];
                }
            } catch (error) {
                console.error('[DEBUG] Province mini trend load failed:', error);
            }

            provinceTrendCache[province] = null;
            return null;
        }

        // 娓叉煋杩蜂綘瓒嬪娍鍥?        async function renderMiniChart(province) {
            const chartDom = document.getElementById(`miniChart_${province}`);
            if (!chartDom) return;
            
            const miniChart = echarts.init(chartDom);
            const lineData = await fetchProvinceTrendData(province);
            if (!lineData) {
                miniChart.setOption({
                    backgroundColor: 'transparent',
                    graphic: {
                        type: 'text',
                        left: 'center',
                        top: 'middle',
                        style: {
                            text: '鏆傛棤鐪熷疄鏃跺簭鏁版嵁',
                            fill: '#94a3b8',
                            font: '12px "Microsoft YaHei"',
                            textAlign: 'center'
                        }
                    }
                }, true);
                return;
            }

            let seriesName = '婧惰В姘?;
            let seriesData = lineData.dissolved_oxygen || [];
            let lineColor = '#0ea5e9';
            if (!seriesData.length && lineData.ammonia_nitrogen && lineData.ammonia_nitrogen.length) {
                seriesName = '姘ㄦ爱';
                seriesData = lineData.ammonia_nitrogen;
                lineColor = '#f59e0b';
            } else if (!seriesData.length && lineData.ph && lineData.ph.length) {
                seriesName = 'PH';
                seriesData = lineData.ph;
                lineColor = '#22c55e';
            }

            const axisLabels = (lineData.dates || []).map(date => String(date).slice(5, 10));
            const option = {
                backgroundColor: 'transparent',
                grid: { top: 10, left: 10, right: 10, bottom: 20 },
                tooltip: {
                    trigger: 'axis',
                    formatter: params => `${seriesName}: ${params[0].value}`
                },
                xAxis: {
                    type: 'category',
                    data: axisLabels,
                    axisLine: { show: false },
                    axisTick: { show: false },
                    axisLabel: { color: '#64748b', fontSize: 9 }
                },
                yAxis: {
                    type: 'value',
                    splitLine: { lineStyle: { color: 'rgba(148,163,184,0.1)' } },
                    axisLabel: { show: false }
                },
                series: [{
                    type: 'line',
                    smooth: true,
                    data: seriesData,
                    lineStyle: { color: lineColor, width: 2 },
                    areaStyle: {
                        color: {
                            type: 'linear',
                            x: 0, y: 0, x2: 0, y2: 1,
                            colorStops: [
                                { offset: 0, color: `${lineColor}4D` },
                                { offset: 1, color: `${lineColor}00` }
                            ]
                        }
                    },
                    symbol: 'none'
                }]
            };
            miniChart.setOption(option);
        }
        
        // 鏇存柊鎺掑悕琛?
        function updateRankingTable() {
            const tbody = document.getElementById('rankingTableBody');
            
            // 鎺掑簭鏁版嵁
            let sortedData = [...provinceData];
            if (sortField === 'do') {
                sortedData.sort((a, b) => sortAsc ? a.do - b.do : b.do - a.do);
            } else if (sortField === 'nh') {
                sortedData.sort((a, b) => sortAsc ? a.nh - b.nh : b.nh - a.nh);
            } else if (sortField === 'tp') {
                sortedData.sort((a, b) => sortAsc ? a.tp - b.tp : b.tp - a.tp);
            } else {
                sortedData.sort((a, b) => sortAsc ? a.score - b.score : b.score - a.score);
            }

            if (!sortedData.length) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="7" style="text-align:center;color:#94a3b8;padding:24px 12px;">鏆傛棤鐪熷疄鐪佷唤瀵规瘮鏁版嵁</td>
                    </tr>
                `;
                return;
            }
            
            tbody.innerHTML = sortedData.map((data, index) => `
                <tr>
                    <td>
                        <span class="rank-badge ${index < 3 ? `rank-${index + 1}` : 'rank-other'}">${index + 1}</span>
                    </td>
                    <td>
                        <div class="province-name">
                            <i class="fa fa-map-marker" style="color: #0ea5e9;"></i>
                            ${data.province}
                        </div>
                    </td>
                    <td style="color: ${data.do >= 7.5 ? '#22c55e' : '#f59e0b'}; font-weight: 600;">${data.do}</td>
                    <td style="color: ${data.nh <= 0.15 ? '#22c55e' : '#f59e0b'}; font-weight: 600;">${data.nh}</td>
                    <td style="color: ${data.tp <= 0.02 ? '#22c55e' : '#f59e0b'}; font-weight: 600;">${data.tp}</td>
                    <td style="color: #0ea5e9; font-weight: bold;">${data.score.toFixed(1)}</td>
                    <td>
                        <span class="indicator-level ${data.levelClass}">${data.level}</span>
                    </td>
                </tr>
            `).join('');
        }
        
        // 鍒濆鍖栨帓搴忓鐞嗗櫒
        function initSortHandlers() {
            document.querySelectorAll('.ranking-table th.sortable').forEach(th => {
                th.addEventListener('click', function() {
                    const field = this.dataset.sort;
                    if (sortField === field) {
                        sortAsc = !sortAsc;
                    } else {
                        sortField = field;
                        sortAsc = true;
                    }
                    
                    // 鏇存柊鎺掑簭鎸囩ず鍣?
                    document.querySelectorAll('.ranking-table th').forEach(h => {
                        h.classList.remove('sort-asc', 'sort-desc');
                    });
                    this.classList.add(sortAsc ? 'sort-asc' : 'sort-desc');
                    
                    updateRankingTable();
                });
            });
        }
        
        // 鏇存柊绠℃帶寤鸿
        function updateSuggestions() {
            const container = document.getElementById('suggestionsContainer');
            if (!provinceData.length) {
                container.innerHTML = `
                    <div class="suggestion-card">
                        <div class="suggestion-title">
                            <i class="fa fa-info-circle"></i>
                            鏆傛棤鐪熷疄寤鸿
                        </div>
                        <div class="suggestion-content">褰撳墠鏁版嵁搴撴殏鏃犺冻澶熺殑鐪佷唤瀵规瘮鏍锋湰锛屾棤娉曠敓鎴愭不鐞嗗缓璁€?/div>
                    </div>
                `;
                return;
            }
            
            // 鏍规嵁鎺掑悕鏄剧ず寤鸿
            const top3 = provinceData.slice(0, 3);
            const bottom3 = provinceData.slice(3);
            
            let html = '';
            
            // 琛ㄧ幇浼樼鐨勭渷浠?            top3.forEach(data => {
                const suggestion = getProvinceSuggestion(data.province);
                if (suggestion) {
                    html += `
                        <div class="suggestion-card">
                            <div class="suggestion-title">
                                <i class="fa fa-check-circle"></i>
                                ${data.province} - 浼樼绀鸿寖
                            </div>
                            <div class="suggestion-content">${suggestion.advantage}</div>
                            <div>
                                <span class="suggestion-tag tag-maintain">缁存寔鐜扮姸</span>
                                ${suggestion.tags.map(t => `<span class="suggestion-tag tag-improve">${t}</span>`).join('')}
                            </div>
                        </div>
                    `;
                }
            });
            
            // 闇€瑕佹敼杩涚殑鐪佷唤
            bottom3.forEach(data => {
                const suggestion = getProvinceSuggestion(data.province);
                if (suggestion) {
                    html += `
                        <div class="suggestion-card" style="border-left-color: #ef4444;">
                            <div class="suggestion-title" style="color: #ef4444;">
                                <i class="fa fa-exclamation-triangle"></i>
                                ${data.province} - 閲嶇偣鏁存敼
                            </div>
                            <div class="suggestion-content">${suggestion.weakness}</div>
                            <div>
                                <span class="suggestion-tag tag-priority">${suggestion.priority}</span>
                                ${suggestion.tags.map(t => `<span class="suggestion-tag tag-improve">${t}</span>`).join('')}
                            </div>
                        </div>
                    `;
                }
            });
            
            container.innerHTML = html;
        }
        
        // 瀵煎嚭鏁版嵁
        function exportData() {
            if (!provinceData.length) {
                showToast('鏆傛棤鐪熷疄鏁版嵁鍙鍑?);
                return;
            }
            const headers = ['鎺掑悕', '鐪佸競', '婧惰В姘?mg/L)', '姘ㄦ爱(mg/L)', '鎬荤７(mg/L)', '缁煎悎寰楀垎', '姘磋川绛夌骇'];
            const rows = provinceData.map((data, index) => [
                index + 1,
                data.province,
                data.do,
                data.nh,
                data.tp,
                data.score.toFixed(1),
                data.level
            ]);
            
            let csv = '\uFEFF' + headers.join(',') + '\n';
            rows.forEach(row => {
                csv += row.join(',') + '\n';
            });
            
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `娲ユ按娴佸煙鍏渷甯傛按璐ㄥ姣擾${new Date().toISOString().slice(0, 10)}.csv`;
            link.click();
            
            showToast('鏁版嵁瀵煎嚭鎴愬姛');
        }
        
        // 鏄剧ず鍔犺浇鐘舵€?
        function showLoading() {
            document.body.style.cursor = 'wait';
        }
        
        // 闅愯棌鍔犺浇鐘舵€?
        function hideLoading() {
            document.body.style.cursor = 'default';
        }
        
        // Toast鎻愮ず
        function showToast(message) {
            const existing = document.querySelector('.toast-message');
            if (existing) existing.remove();
            
            const toast = document.createElement('div');
            toast.className = 'toast-message';
            toast.innerHTML = `
                <div style="
                    position: fixed;
                    top: 80px;
                    left: 50%;
                    transform: translateX(-50%);
                    background: linear-gradient(135deg, rgba(14, 165, 233, 0.9), rgba(34, 197, 94, 0.9));
                    color: white;
                    padding: 12px 24px;
                    border-radius: 8px;
                    font-size: 14px;
                    z-index: 10000;
                    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
                ">${message}</div>
            `;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        // 鐐瑰嚮绌虹櫧澶勫叧闂脊绐?
        document.addEventListener('click', function(e) {
            const popup = document.getElementById('mapPopup');
            const mapChart = document.getElementById('mapChart');
            if (popup.classList.contains('active') && !popup.contains(e.target) && !mapChart.contains(e.target)) {
                closePopup();
            }
        });
    </script>
</body>
</html>
