<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>娴锋渤鍏煙 - 鏃跺簭瓒嬪娍涓撻」鍒嗘瀽灞?/title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>

            theme: {
                extend: {
                    colors: {
                        primary: '#0ea5e9',

                        secondary: '#22c55e',

                }
            }
        }
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            min-height: 100%;
            overflow-x: hidden;
            overflow-y: auto;
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0a0f1c 0%, #0d1321 50%, #0a0f1c 100%);
            color: #fff;
        }
        
        /* 绉戞妧鎰熻儗鏅綉鏍?*/
        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(14, 165, 233, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(14, 165, 233, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
        }
        
        /* 鍙戝厜瑁呴グ */
        .glow-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            pointer-events: none;
            z-index: 0;
        }
        
        .glow-orb-1 {
            top: -10%;
            left: -10%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(14, 165, 233, 0.15) 0%, transparent 70%);
        }
        
        .glow-orb-2 {
            bottom: -10%;
            right: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(34, 197, 94, 0.1) 0%, transparent 70%);
        }
        
        /* 涓诲鍣?*/
        .main-container {
            position: relative;
            top: 64px;
            left: 0;
            right: 0;
            min-height: calc(100vh - 64px);
            padding: 20px;
            z-index: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding-bottom: 40px;
        }
        
        /* 椤堕儴瀵艰埅鏍?*/
        .top-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 64px;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(14, 165, 233, 0.2);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
        }
        
        .nav-title {
            font-size: 22px;
            font-weight: bold;
            background: linear-gradient(90deg, #0ea5e9, #22c55e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .nav-back {
            padding: 8px 20px;
            background: rgba(14, 165, 233, 0.15);
            border: 1px solid rgba(14, 165, 233, 0.4);
            border-radius: 6px;
            color: #0ea5e9;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }
        
        .nav-back:hover {
            background: rgba(14, 165, 233, 0.3);
            transform: translateY(-1px);
        }
        
        /* 鏍稿績缁撹鏍?*/
        .conclusion-bar {
            display: flex;
            gap: 20px;
            padding: 15px 20px;
            background: linear-gradient(90deg, 
                rgba(14, 165, 233, 0.1) 0%, 
                rgba(34, 197, 94, 0.05) 50%,
                rgba(14, 165, 233, 0.1) 100%);
            border: 1px solid rgba(14, 165, 233, 0.3);
            border-radius: 12px;
            position: relative;
            overflow: hidden;
        }
        
        .conclusion-bar::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, 
                transparent 0%, 
                #0ea5e9 20%, 
                #22c55e 50%, 
                #0ea5e9 80%, 
                transparent 100%);
        }
        
        .conclusion-tag {
            flex: 1;
            padding: 15px 20px;
            background: rgba(15, 23, 42, 0.6);
            border-radius: 10px;
            border: 1px solid;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.3s;
        }
        
        .conclusion-tag:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }
        
        .conclusion-tag.tag-1 {
            border-color: rgba(0, 228, 0, 0.4);
            background: linear-gradient(135deg, rgba(0, 228, 0, 0.1) 0%, rgba(15, 23, 42, 0.8) 100%);
        }
        
        .conclusion-tag.tag-2 {
            border-color: rgba(14, 165, 233, 0.4);
            background: linear-gradient(135deg, rgba(14, 165, 233, 0.1) 0%, rgba(15, 23, 42, 0.8) 100%);
        }
        
        .conclusion-tag.tag-3 {
            border-color: rgba(34, 197, 94, 0.4);
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.1) 0%, rgba(15, 23, 42, 0.8) 100%);
        }
        
        .tag-icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        
        .tag-1 .tag-icon {
            background: rgba(0, 228, 0, 0.2);
            color: #00e400;
        }
        
        .tag-2 .tag-icon {
            background: rgba(14, 165, 233, 0.2);
            color: #0ea5e9;
        }
        
        .tag-3 .tag-icon {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
        }
        
        .tag-content {
            flex: 1;
        }
        
        .tag-title {
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 4px;
        }
        
        .tag-value {
            font-size: 18px;
            font-weight: bold;
            color: #e2e8f0;
        }
        
        .tag-highlight {
            color: #22c55e;
            font-weight: bold;
        }
        
        /* 涓讳綋鍐呭鍖?*/
        .content-area {
            display: grid;
            grid-template-columns: 1fr 360px;
            gap: 20px;
            min-height: 800px;
        }
        
        /* 鍥捐〃鍗＄墖 */
        .chart-card {
            background: linear-gradient(145deg, rgba(15, 23, 42, 0.8) 0%, rgba(30, 41, 59, 0.6) 100%);
            border: 1px solid rgba(14, 165, 233, 0.2);
            border-radius: 12px;
            padding: 20px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        /* 绉戞妧鎰熷洓瑙掕楗?*/
        .chart-card::before,
        .chart-card::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid #0ea5e9;
        }
        
        .chart-card::before {
            top: 0;
            left: 0;
            border-right: none;
            border-bottom: none;
            border-top-left-radius: 8px;
        }
        
        .chart-card::after {
            bottom: 0;
            right: 0;
            border-left: none;
            border-top: none;
            border-bottom-right-radius: 8px;
        }
        
        .corner-decoration {
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid #0ea5e9;
        }
        
        .corner-tl { top: 0; left: 0; border-right: none; border-bottom: none; border-top-left-radius: 8px; }
        .corner-tr { top: 0; right: 0; border-left: none; border-bottom: none; border-top-right-radius: 8px; }
        .corner-bl { bottom: 0; left: 0; border-right: none; border-top: none; border-bottom-left-radius: 8px; }
        .corner-br { bottom: 0; right: 0; border-left: none; border-top: none; border-bottom-right-radius: 8px; }
        
        /* 鍗＄墖鏍囬 */
        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(14, 165, 233, 0.2);
            flex-shrink: 0;
        }
        
        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: #e2e8f0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .card-title i {
            color: #0ea5e9;
            font-size: 18px;
        }
        
        .card-subtitle {
            font-size: 12px;
            color: #64748b;
        }
        
        /* 鍥捐〃瀹瑰櫒 */
        .chart-container {
            flex: 1;
            min-height: 0;
            position: relative;
        }
        
        /* 涓昏瑙夊尯 */
        .main-visual {
            display: flex;
            flex-direction: column;
            gap: 15px;
            height: fit-content;
        }
        
        .indicator-chart {
            height: 280px;
            min-height: 280px;
            background: rgba(15, 23, 42, 0.5);
            border-radius: 10px;
            border: 1px solid rgba(14, 165, 233, 0.15);
            padding: 15px;
            display: flex;
            flex-direction: column;
        }
        
        .indicator-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        
        .indicator-name {
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .indicator-name.do { color: #0ea5e9; }
        .indicator-name.ph { color: #22c55e; }
        .indicator-name.nh { color: #f59e0b; }
        
        .indicator-badge {
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 500;
        }
        
        .badge-level-1 { background: rgba(0, 228, 0, 0.2); color: #00e400; border: 1px solid rgba(0, 228, 0, 0.3); }
        .badge-level-2 { background: rgba(255, 255, 0, 0.2); color: #ffff00; border: 1px solid rgba(255, 255, 0, 0.3); }
        .badge-level-3 { background: rgba(255, 126, 0, 0.2); color: #ff7e00; border: 1px solid rgba(255, 126, 0, 0.3); }
        
        .indicator-chart-container {
            flex: 1;
            min-height: 0;
        }
        
        /* 鍙充晶杈呭姪鍒嗘瀽鍖?*/
        .right-panel {
            display: flex;
            flex-direction: column;
            gap: 15px;
            height: fit-content;
        }
        
        .right-panel .chart-card {
            min-height: 200px;
        }
        
        /* 缁熻琛ㄦ牸鏍峰紡 */
        .stats-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }
        
        .stats-table th,
        .stats-table td {
            padding: 10px 8px;
            text-align: center;
            border-bottom: 1px solid rgba(14, 165, 233, 0.1);
        }
        
        .stats-table th {
            background: rgba(14, 165, 233, 0.1);
            color: #0ea5e9;
            font-weight: 600;
            font-size: 11px;
        }
        
        .stats-table td {
            color: #e2e8f0;
        }
        
        .stats-table tr:hover td {
            background: rgba(14, 165, 233, 0.05);
        }
        
        .stats-indicator {
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .stats-indicator.do { color: #0ea5e9; }
        .stats-indicator.ph { color: #22c55e; }
        .stats-indicator.nh { color: #f59e0b; }
        
        /* 瓒嬪娍妫€楠岀粨鏋?*/
        .trend-result {
            padding: 12px;
            background: rgba(15, 23, 42, 0.5);
            border-radius: 8px;
            border-left: 3px solid #0ea5e9;
            margin-bottom: 10px;
        }
        
        .trend-result:last-child {
            margin-bottom: 0;
        }
        
        .trend-label {
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 4px;
        }
        
        .trend-value {
            font-size: 14px;
            font-weight: 600;
            color: #e2e8f0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .trend-status {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
        }
        
        .status-improving {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
        }
        
        .status-stable {
            background: rgba(14, 165, 233, 0.2);
            color: #0ea5e9;
        }
        
        /* 宸ュ叿鏍?*/
        .toolbar {
            display: flex;
            gap: 10px;
            padding: 10px 15px;
            background: rgba(15, 23, 42, 0.6);
            border-radius: 8px;
            margin-bottom: 15px;
        }
        
        .tool-btn {
            padding: 6px 14px;
            background: rgba(14, 165, 233, 0.1);
            border: 1px solid rgba(14, 165, 233, 0.3);
            border-radius: 6px;
            color: #94a3b8;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .tool-btn:hover {
            background: rgba(14, 165, 233, 0.25);
            color: #e2e8f0;
        }
        
        .tool-btn.active {
            background: linear-gradient(135deg, rgba(14, 165, 233, 0.4), rgba(34, 197, 94, 0.3));
            color: #fff;
            border-color: #0ea5e9;
        }
        
        /* 姘磋川绛夌骇鍥句緥 */
        .level-legend {
            display: flex;
            gap: 15px;
            align-items: center;
            padding: 8px 15px;
            background: rgba(15, 23, 42, 0.5);
            border-radius: 20px;
            font-size: 11px;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 2px;
        }
        
        /* 鑷畾涔夋粴鍔ㄦ潯 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: rgba(14, 165, 233, 0.1);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, rgba(14, 165, 233, 0.5), rgba(34, 197, 94, 0.5));
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(135deg, rgba(14, 165, 233, 0.7), rgba(34, 197, 94, 0.7));
        }
        
        /* 鍝嶅簲寮?*/
        @media (max-width: 1400px) {
            .content-area {
                grid-template-columns: 1fr 320px;
            }
        }
        
        @media (max-width: 1200px) {
            .content-area {
                grid-template-columns: 1fr;
            }
            .right-panel {
                flex-direction: row;
                flex-wrap: wrap;
            }
            .right-panel .chart-card {
                flex: 1;
                min-width: 300px;
            }
        }
        
        /* 鍔ㄧ敾 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .animate-fade-in {
            animation: fadeIn 0.5s ease-out;
        }
    </style>
    <script src="../config/site.config.js"></script>
    <script src="../config/runtime-config.js"></script>
</head>
<body>
    <!-- 鑳屾櫙瑁呴グ -->
    <div class="bg-grid"></div>
    <div class="glow-orb glow-orb-1"></div>
    <div class="glow-orb glow-orb-2"></div>
    
    <!-- 椤堕儴瀵艰埅 -->
    <nav class="top-nav">
        <div class="nav-title">
            <i class="fa fa-line-chart"></i>
            鏃跺簭瓒嬪娍涓撻」鍒嗘瀽灞?

    <!-- 涓诲鍣?-->

    <script>
        // API鍩虹URL
        const API_BASE = (() => {

        // 鐪熷疄鏁版嵁瀛樺偍

        // 鍔犺浇鐪熷疄鏁版嵁

                    fetch(`${API_BASE}/dashboard/timeseries-data`).then(r => {
                        console.log('[DEBUG] Timeseries response status:', r.status);
                        return r.json();
                    }).catch(e => {
                        console.error('[DEBUG] Timeseries fetch error:', e);
                        return { success: false, error: e.message };
                    }),
                    fetch(`${API_BASE}/dashboard/overview-stats`).then(r => r.json()).catch(e => {
                        console.error('[DEBUG] Overview fetch error:', e);
                        return { success: false };
                    }),
                    fetch(`${API_BASE}/dashboard/boxplot-data`).then(r => r.json()).catch(e => {
                        console.error('[DEBUG] Boxplot fetch error:', e);
                        return { success: false };
                    })
                ]);
                
                console.log('[DEBUG] Timeseries response:', timeseriesRes);
                
                if (timeseriesRes.success && timeseriesRes.data && timeseriesRes.data.dates && timeseriesRes.data.dates.length > 0) {
                    console.log('[DEBUG] Processing timeseries data:', timeseriesRes.data);
                    timeSeriesData.dates = timeseriesRes.data.dates;
                    timeSeriesData.dissolved_oxygen = timeseriesRes.data.dissolved_oxygen;
                    timeSeriesData.ph = timeseriesRes.data.ph;
                    timeSeriesData.ammonia_nitrogen = timeseriesRes.data.ammonia_nitrogen;
                    
                    // 鏇存柊鍥捐〃
                    renderDOChart();
                    renderPHChart();
                    renderNHChart();
                    
                    // 璁＄畻骞舵洿鏂扮粺璁℃暟鎹?
                    calculateStats();
                    updateStatsTable();
                    
                    // 鏇存柊鍒嗘椂娈靛姣斿浘
                    renderSeasonChart();
                    
                    // 鏇存柊瓒嬪娍妫€楠岀粨鏋?
                    updateTrendAnalysis();
                    
                    if (timeseriesRes.data.message) {
                        showToast(timeseriesRes.data.message);
                    }
                } else {
                    const message = (timeseriesRes.data && timeseriesRes.data.message) || timeseriesRes.error || '鏆傛棤鐪熷疄鏃跺簭鏁版嵁';
                    console.warn('[DEBUG] No valid timeseries data:', message);
                    renderNoDataState(message);
                    showToast(message);
                }
                
                // 澶勭悊绠辩嚎鍥炬暟鎹紙鐢ㄤ簬鏋佸€肩粺璁★級
                if (boxplotRes.success && boxplotRes.data && timeSeriesData.dates.length > 0) {
                    updateStatsFromBoxplot(boxplotRes.data);
                }
                
                hideLoading();
            } catch (error) {
                console.error('[DEBUG] Global error:', error);
                renderNoDataState('鏁版嵁鍔犺浇澶辫触锛屾湭鍔犺浇鍒扮湡瀹炴椂搴忔暟鎹?);
                showToast('鏁版嵁鍔犺浇澶辫触锛屾湭鍔犺浇鍒扮湡瀹炴椂搴忔暟鎹?);
                hideLoading();

        function setStatsPlaceholder() {

        function renderChartEmpty(chart, message) {

            if (phEl) phEl.innerHTML = '<i class="fa fa-minus" style="color: #64748b;"></i> 鏆傛棤鐪熷疄瓒嬪娍鏁版嵁 <span class="trend-status status-stable">寰呰ˉ鍏?/span>';
            if (nhEl) nhEl.innerHTML = '<i class="fa fa-minus" style="color: #64748b;"></i> 鏆傛棤鐪熷疄瓒嬪娍鏁版嵁 <span class="trend-status status-stable">寰呰ˉ鍏?/span>';
            if (conclusionEl) {

        // 鏄剧ず鍔犺浇鐘舵€?

        // 璁＄畻缁熻鏁版嵁
        function calculateStats() {
            // 婧惰В姘х粺璁?
            const doValues = timeSeriesData.dissolved_oxygen;
            statsData.do.max = Math.max(...doValues);
            statsData.do.min = Math.min(...doValues);
            statsData.do.avg = (doValues.reduce((a, b) => a + b, 0) / doValues.length).toFixed(2);
            statsData.do.median = calculateMedian(doValues);
            // 璁＄畻杈炬爣鐜囷紙>= 7.5 涓?I 绫伙級
            statsData.do.compliance = ((doValues.filter(v => v >= 7.5).length / doValues.length) * 100).toFixed(1);
            
            // PH缁熻
            const phValues = timeSeriesData.ph;
            statsData.ph.max = Math.max(...phValues);
            statsData.ph.min = Math.min(...phValues);
            statsData.ph.avg = (phValues.reduce((a, b) => a + b, 0) / phValues.length).toFixed(2);
            statsData.ph.median = calculateMedian(phValues);
            // 璁＄畻杈炬爣鐜囷紙6-9 涓鸿揪鏍囷級
            statsData.ph.compliance = ((phValues.filter(v => v >= 6 && v <= 9).length / phValues.length) * 100).toFixed(1);
            
            // 姘ㄦ爱缁熻
            const nhValues = timeSeriesData.ammonia_nitrogen;
            statsData.nh.max = Math.max(...nhValues);
            statsData.nh.min = Math.min(...nhValues);
            statsData.nh.avg = (nhValues.reduce((a, b) => a + b, 0) / nhValues.length).toFixed(3);
            statsData.nh.median = calculateMedian(nhValues);
            // 璁＄畻杈炬爣鐜囷紙<= 0.5 涓?II 绫伙級
            statsData.nh.compliance = ((nhValues.filter(v => v <= 0.5).length / nhValues.length) * 100).toFixed(1);
        }
        
        // 璁＄畻涓綅鏁?
        function calculateMedian(arr) {
            const sorted = [...arr].sort((a, b) => a - b);
            const mid = Math.floor(sorted.length / 2);
            return sorted.length % 2 ? sorted[mid] : ((sorted[mid - 1] + sorted[mid]) / 2).toFixed(2);
        }
        
        // Mann-Kendall瓒嬪娍妫€楠岋紙绠€鍖栫増锛?
        function calculateMannKendall(data) {
            const n = data.length;
            if (n < 3) return { trend: 'stable', pValue: 1 };
            
            let s = 0;
            for (let i = 0; i < n - 1; i++) {
                for (let j = i + 1; j < n; j++) {
                    s += Math.sign(data[j] - data[i]);
                }
            }
            
            // 璁＄畻鏂瑰樊
            const varS = n * (n - 1) * (2 * n + 5) / 18;
            
            // 璁＄畻Z鍊?
            let z = 0;
            if (s > 0) {
                z = (s - 1) / Math.sqrt(varS);
            } else if (s < 0) {
                z = (s + 1) / Math.sqrt(varS);
            }
            
            // 鍒ゆ柇瓒嬪娍
            const absZ = Math.abs(z);
            let trend = 'stable';
            if (absZ > 1.96) {
                trend = z > 0 ? 'increasing' : 'decreasing';
            }
            
            // 瀵绘壘绐佸彉鐐癸紙绠€鍖栵細鎵惧埌瓒嬪娍鍙樺寲鏈€澶х殑浣嶇疆锛?
            let changePoint = -1;
            let maxChange = 0;
            for (let i = 1; i < n; i++) {
                const change = Math.abs(data[i] - data[i-1]);
                if (change > maxChange) {
                    maxChange = change;
                    changePoint = i;
                }
            }
            
            return { trend, z, changePoint: changePoint > 0 ? changePoint : -1 };
        }
        
        // 鏇存柊瓒嬪娍妫€楠岀粨鏋?
        function updateTrendAnalysis() {
            // 婧惰В姘ц秼鍔?
            const doResult = calculateMannKendall(timeSeriesData.dissolved_oxygen);

                const doIcon = doResult.trend === 'increasing' ? 'fa-arrow-up' :

                const doColor = doResult.trend === 'increasing' ? '#22c55e' :

                const doText = doResult.trend === 'increasing' ? '鏁翠綋鍛堜笂鍗囪秼鍔? :
                              doResult.trend === 'decreasing' ? '鏁翠綋鍛堜笅闄嶈秼鍔? : '鏁翠綋淇濇寔绋冲畾';
                const doStatus = doResult.trend === 'increasing' ? '鏄捐憲鏀瑰杽' :
                                 doResult.trend === 'decreasing' ? '闇€鍏虫敞' : '楂樺害绋冲畾';
                const doStatusClass = doResult.trend === 'increasing' ? 'status-improving' :
                                      doResult.trend === 'decreasing' ? 'status-stable' : 'status-stable';
                
                doEl.innerHTML = `

            }
            
            // PH瓒嬪娍
            const phResult = calculateMannKendall(timeSeriesData.ph);
            const phEl = document.getElementById('phTrend');
            if (phEl) {
                const phIcon = phResult.trend === 'stable' ? 'fa-minus' : 
                              phResult.trend === 'increasing' ? 'fa-arrow-up' : 'fa-arrow-down';
                const phText = phResult.trend === 'stable' ? '娉㈠姩骞呭害灏? :
                              phResult.trend === 'increasing' ? '鐣ユ湁涓婂崌' : '鐣ユ湁涓嬮檷';
                
                phEl.innerHTML = `
                    <i class="fa ${phIcon}" style="color: #0ea5e9;"></i>
                    ${phText}
                    <span class="trend-status status-stable">楂樺害绋冲畾</span>
                `;
            }
            
            // 姘ㄦ爱瓒嬪娍
            const nhResult = calculateMannKendall(timeSeriesData.ammonia_nitrogen);
            const nhEl = document.getElementById('nhTrend');
            if (nhEl) {
                const nhIcon = nhResult.trend === 'decreasing' ? 'fa-arrow-down' :
                              nhResult.trend === 'increasing' ? 'fa-arrow-up' : 'fa-minus';
                const nhColor = nhResult.trend === 'decreasing' ? '#22c55e' :
                               nhResult.trend === 'increasing' ? '#ef4444' : '#0ea5e9';
                const nhText = nhResult.trend === 'decreasing' ? '娴撳害閫愭闄嶄綆' :
                              nhResult.trend === 'increasing' ? '娴撳害鏈夋墍涓婂崌' : '娴撳害淇濇寔绋冲畾';
                const nhStatus = nhResult.trend === 'decreasing' ? '鎸佺画鏀瑰杽' :
                                 nhResult.trend === 'increasing' ? '闇€鍏虫敞' : '鍩烘湰绋冲畾';
                const nhStatusClass = nhResult.trend === 'decreasing' ? 'status-improving' :
                                      nhResult.trend === 'increasing' ? 'status-stable' : 'status-stable';
                
                nhEl.innerHTML = `
                    <i class="fa ${nhIcon}" style="color: ${nhColor};"></i>

                `;
            }
            
            // 鏇存柊缁撹
            const conclusionEl = document.getElementById('trendConclusion');
            if (conclusionEl && doResult.changePoint > 0) {
                const changeDate = timeSeriesData.dates[doResult.changePoint] || '鏈煡';
                conclusionEl.innerHTML = `
                    <i class="fa fa-info-circle" style="color: #0ea5e9; margin-right: 5px;"></i>
                    妫€楠岀粨鏋滐細${changeDate} 鍓嶅悗鍑虹幇姘磋川鍙樺寲瓒嬪娍鎷愮偣锛屽彲鑳戒笌瀛ｈ妭鍙樺寲鎴栨不鐞嗘帾鏂芥湁鍏?
                `;
            }
        }
        
        // 浠庣绾垮浘鏁版嵁鏇存柊缁熻
        function updateStatsFromBoxplot(data) {
            if (data.indicators && data.indicators.length > 0) {
                const indicatorMap = {};
                data.indicators.forEach(item => {

                });

                const doStats = indicatorMap['婧惰В姘?];
                const phStats = indicatorMap['PH'];

                if (doStats) {
                    statsData.do.min = doStats.min;
                    statsData.do.max = doStats.max;
                    statsData.do.median = doStats.median;
                }
                if (phStats) {
                    statsData.ph.min = phStats.min;
                    statsData.ph.max = phStats.max;
                    statsData.ph.median = phStats.median;
                }
                if (nhStats) {
                    statsData.nh.min = nhStats.min;
                    statsData.nh.max = nhStats.max;
                    statsData.nh.median = nhStats.median;
                }
            }
            updateStatsTable();
        }

        // 璁＄畻姹涙湡/闈炴睕鏈熸暟鎹?
        function calculateSeasonData() {
            const yearData = {};
            
            // 鎸夊勾浠藉垎缁?
            timeSeriesData.dates.forEach((date, index) => {
                const year = date.slice(0, 4);
                const month = parseInt(date.slice(5, 7));
                
                if (!yearData[year]) {
                    yearData[year] = {
                        flood: [],
                        nonFlood: []
                    };
                }
                
                // 璁＄畻缁煎悎姘磋川鎸囨暟锛堝熀浜庝笁涓寚鏍囷級
                const doScore = Math.min(timeSeriesData.dissolved_oxygen[index] / 10, 1);
                const phScore = 1 - Math.abs(timeSeriesData.ph[index] - 8) / 2;
                const nhScore = 1 - Math.min(timeSeriesData.ammonia_nitrogen[index] / 0.5, 1);
                const compositeScore = (doScore + phScore + nhScore) / 3;
                
                // 6-9鏈堜负姹涙湡
                if (month >= 6 && month <= 9) {
                    yearData[year].flood.push(compositeScore);
                } else {
                    yearData[year].nonFlood.push(compositeScore);
                }
            });
            
            const years = Object.keys(yearData).sort();
            const floodSeason = [];
            const nonFloodSeason = [];
            const annualAvg = [];
            
            years.forEach(year => {
                const floodAvg = yearData[year].flood.length > 0 
                    ? yearData[year].flood.reduce((a, b) => a + b, 0) / yearData[year].flood.length 
                    : 0;
                const nonFloodAvg = yearData[year].nonFlood.length > 0 
                    ? yearData[year].nonFlood.reduce((a, b) => a + b, 0) / yearData[year].nonFlood.length 
                    : 0;
                const all = [...yearData[year].flood, ...yearData[year].nonFlood];
                const avg = all.length > 0 ? all.reduce((a, b) => a + b, 0) / all.length : 0;
                
                floodSeason.push(Number(floodAvg.toFixed(2)));
                nonFloodSeason.push(Number(nonFloodAvg.toFixed(2)));
                annualAvg.push(Number(avg.toFixed(2)));
            });
            
            return { years, floodSeason, nonFloodSeason, annualAvg };
        }

            const doContainer = document.getElementById('doChartContainer');
            const phContainer = document.getElementById('phChartContainer');
            const nhContainer = document.getElementById('nhChartContainer');
            
            if (view === 'all') {
                doContainer.style.display = 'flex';
                phContainer.style.display = 'flex';
                nhContainer.style.display = 'flex';
                doContainer.style.height = '280px';
                phContainer.style.height = '280px';
                nhContainer.style.height = '280px';
            } else if (view === 'do') {
                doContainer.style.display = 'flex';
                phContainer.style.display = 'none';
                nhContainer.style.display = 'none';
                doContainer.style.height = '600px';
            } else if (view === 'ph') {
                doContainer.style.display = 'none';
                phContainer.style.display = 'flex';
                nhContainer.style.display = 'none';
                phContainer.style.height = '600px';
            } else if (view === 'nh') {
                doContainer.style.display = 'none';
                phContainer.style.display = 'none';
                nhContainer.style.display = 'flex';
                nhContainer.style.height = '600px';
            }
            
            // 閲嶆柊璋冩暣鍥捐〃澶у皬
            setTimeout(() => {
                Object.values(charts).forEach(chart => chart && chart.resize());
            }, 100);
        }
        
        // 鍒囨崲瀵规瘮妯″紡
        function toggleCompare() {
            // 鏇存柊鎸夐挳鐘舵€?
            document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active'));
            event.target.closest('.tool-btn').classList.add('active');
            
            // 鍒涘缓瀵规瘮鍥捐〃
            const compareChart = echarts.init(document.getElementById('doChart'));
            
            const option = {
                backgroundColor: 'transparent',
                tooltip: {
                    trigger: 'axis'
                },
                legend: {
                    data: ['婧惰В姘?, 'PH', '姘ㄦ爱'],
                    textStyle: { color: '#94a3b8', fontSize: 10 },
                    top: 0
                },
                grid: {
                    top: '15%',
                    left: '3%',
                    right: '4%',
                    bottom: '15%',
                    containLabel: true
                },
                xAxis: {
                    type: 'category',
                    boundaryGap: false,
                    data: timeSeriesData.dates,
                    axisLabel: {
                        color: '#94a3b8',
                        fontSize: 10,
                        rotate: 30
                    }
                },
                yAxis: [
                    {
                        type: 'value',
                        name: 'DO/PH',
                        position: 'left',
                        axisLabel: { color: '#94a3b8', fontSize: 10 },
                        splitLine: { lineStyle: { color: 'rgba(148, 163, 184, 0.1)' } }
                    },
                    {
                        type: 'value',
                        name: '姘ㄦ爱',
                        position: 'right',
                        axisLabel: { color: '#94a3b8', fontSize: 10 }
                    }
                ],
                dataZoom: [
                    { type: 'inside', start: 0, end: 100 },
                    { type: 'slider', start: 0, end: 100, bottom: 5, height: 20 }
                ],
                series: [
                    {
                        name: '婧惰В姘?,
                        type: 'line',
                        smooth: true,
                        data: timeSeriesData.dissolved_oxygen,
                        lineStyle: { color: '#0ea5e9', width: 2 },
                        itemStyle: { color: '#0ea5e9' }
                    },
                    {
                        name: 'PH',
                        type: 'line',
                        smooth: true,
                        data: timeSeriesData.ph,
                        lineStyle: { color: '#22c55e', width: 2 },
                        itemStyle: { color: '#22c55e' }
                    },
                    {
                        name: '姘ㄦ爱',
                        type: 'line',
                        smooth: true,
                        yAxisIndex: 1,
                        data: timeSeriesData.ammonia_nitrogen,
                        lineStyle: { color: '#f59e0b', width: 2 },
                        itemStyle: { color: '#f59e0b' }
                    }
                ]
            };
            
            compareChart.setOption(option);
            
            // 闅愯棌鍏朵粬鍥捐〃瀹瑰櫒锛屾斁澶ф憾瑙ｆ哀瀹瑰櫒鐢ㄤ簬鏄剧ず瀵规瘮鍥?
            const doContainer = document.getElementById('doChartContainer');
            doContainer.style.display = 'flex';
            doContainer.style.height = '600px';
            document.getElementById('phChartContainer').style.display = 'none';
            document.getElementById('nhChartContainer').style.display = 'none';
            
            // 閲嶆柊璋冩暣鍥捐〃澶у皬
            setTimeout(() => {
                compareChart.resize();
            }, 100);
        }
    </script>
